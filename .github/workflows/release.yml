name: Release

on:
  push:
    tags:
      # Stable: v8.7.3
      - "v[0-9]+.[0-9]+.[0-9]+"
      # PEP 440 pre-releases: v8.8.0a1, v8.8.0b2, v8.8.0rc1.
      # GitHub Actions tag globs use shell-glob (not regex) so we list
      # the alpha/beta and rc shapes separately. The github-release
      # step computes the prerelease flag from the tag suffix so these
      # don't displace the "Latest" release.
      - "v[0-9]+.[0-9]+.[0-9]+[ab][0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate: re-run the full unit suite + pyright strict before doing anything
  # publish-shaped. CI (ci.yml) runs the same checks on every push to main,
  # but tag pushes can race CI or be cut from a commit where CI was red —
  # this job makes the release pipeline self-gating so a failing test
  # can't reach TestPyPI / prod PyPI.
  # ---------------------------------------------------------------------------
  tests:
    name: Tests + pyright strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (V.2 — uv sync from uv.lock)
        # `[audit]` brings in reportlab + pypdf + pyhanko; tests/audit/
        # invokes `audit apply --execute` which needs pyhanko on every
        # render (empty reviewer signature widgets).
        run: uv sync --frozen --extra dev --extra audit

      - name: Install Playwright WebKit browser
        # Mirrors ci.yml's step. tests/js/test_render_table.py launches
        # WebKit via Playwright; the browser binary is not bundled with
        # the Python package, so CI must `playwright install` it
        # explicitly. Otherwise pytest fails with
        # "Executable doesn't exist at /home/runner/.cache/ms-playwright/webkit-…/pw_run.sh".
        run: .venv/bin/playwright install --with-deps webkit

      - name: Run tests with coverage (pytest sessionstart runs pyright strict)
        # AB.7.1a — name the coverage file so the aggregator job can
        # combine it with the e2e + smoke legs into one release-wide
        # report. Drop --cov-report so we don't write per-step xml
        # (the aggregator emits one combined xml).
        env:
          COVERAGE_FILE: .coverage.release-unit
        run: .venv/bin/pytest --cov=recon_gen

      - name: Upload unit coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-release-unit
          path: .coverage.release-unit
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build sdist + wheel
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (V.2 — uv sync; build + twine are in [dev])
        run: uv sync --frozen --extra dev

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(.venv/bin/python -c "import tomllib, pathlib; \
            data = tomllib.loads(pathlib.Path('pyproject.toml').read_text()); \
            attr = data['tool']['setuptools']['dynamic']['version']['attr']; \
            mod, var = attr.rsplit('.', 1); \
            import importlib, sys; sys.path.insert(0, 'src'); \
            print(getattr(importlib.import_module(mod), var))")
          echo "tag=${TAG} package=${PKG_VERSION}"
          if [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build sdist + wheel
        run: .venv/bin/python -m build

      - name: Sync shim version + recon-gen pin to ${TAG} (AC.F.1 lockstep)
        # AA.A.996.release-fix, 2026-05-18 — v11.0.1's release failed because
        # the shim's in-tree pyproject.toml was still pinned to 11.0.0 while
        # the main package bumped to 11.0.1; the Smoke test wheel step's
        # ``pip install ./dist/*.whl`` blew up on the recon-gen==11.0.0 pin
        # vs the recon_gen-11.0.1-py3-none-any.whl side-by-side. CI is now
        # the authoritative bumper — the shim's in-tree version is just a
        # placeholder; this step rewrites it from ${TAG} so manual lockstep
        # can no longer drift.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${TAG}\"/" quicksight-gen-shim/pyproject.toml
          sed -i "s/^    \"recon-gen==.*/    \"recon-gen==${TAG}\",/" quicksight-gen-shim/pyproject.toml
          echo "--- shim pyproject.toml after sync ---"
          grep -E '^(version|    "recon-gen==)' quicksight-gen-shim/pyproject.toml

      - name: Build quicksight-gen shim (AC.F.1 — PyPI deprecation shim)
        # Builds the `quicksight-gen` meta-package into the same dist/
        # directory so the existing upload-artifact / pypi-publish steps
        # pick up both wheels in one go. The shim has its own pyproject
        # and version-pins to the same recon-gen version this tag emits
        # (lockstep — see quicksight-gen-shim/pyproject.toml). Drops in
        # the next release after the 1-2 month AC.F.3 grace window.
        run: .venv/bin/python -m build --outdir dist/ quicksight-gen-shim/

      - name: Verify long description renders on PyPI
        run: .venv/bin/twine check dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Smoke-test the wheel against the unit + integration suite (no AWS)
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke test wheel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel into fresh venv
        run: |
          python -m venv /tmp/qs-smoke
          /tmp/qs-smoke/bin/pip install --upgrade pip
          /tmp/qs-smoke/bin/pip install dist/*.whl pytest pytest-cov boto3-stubs[quicksight] psycopg2-binary

      - name: Verify CLI version flag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          OUT=$(/tmp/qs-smoke/bin/recon-gen --version)
          echo "${OUT}"
          echo "${OUT}" | grep -q "${TAG}" || { echo "::error::--version output missing tag ${TAG}"; exit 1; }

      - name: Run unit + integration tests against installed wheel
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          # Skip pytest_sessionstart's pyright gate — pyright isn't
          # installed against the smoke venv (it's a [dev] extra the
          # smoke env doesn't pull). The wheel itself is the subject
          # under test, not its pyright cleanliness.
          RECON_GEN_SKIP_PYRIGHT: "1"
          # AB.7.1a — coverage from the installed-wheel smoke test.
          COVERAGE_FILE: .coverage.release-smoke
        run: |
          # Q.3.a.9 reorg moved these into tests/{unit,json}/ for v8.0.0.
          /tmp/qs-smoke/bin/pytest \
            tests/unit/test_models.py \
            tests/unit/test_persona.py \
            tests/unit/test_theme_presets.py \
            tests/json/test_dataset_contract.py \
            --cov=recon_gen

      - name: Upload smoke coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-release-smoke
          path: .coverage.release-smoke
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI (always on tag) — Trusted Publisher OIDC, no tokens
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [smoke]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/recon-gen
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Verify the just-published TestPyPI release actually installs.
  #
  # The local-wheel `smoke` job above proves the wheel is sound, but it
  # can't catch (a) missing files stripped by the sdist/wheel upload, or
  # (b) PyPI metadata rejections that succeed locally. Pulling from the
  # index after publish closes that gap before we promote to prod.
  #
  # CDN propagation lag is real (1-2 min after publish for the index to
  # serve the new version), so the install step retries. TestPyPI doesn't
  # mirror our dependencies (boto3, etc.) — `--extra-index-url` lets pip
  # fetch deps from prod PyPI while pulling the package itself from
  # TestPyPI.
  # ---------------------------------------------------------------------------
  verify-testpypi-install:
    name: Verify TestPyPI install
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install from TestPyPI (with retries for CDN propagation)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/qs-verify-testpypi
          /tmp/qs-verify-testpypi/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: pip install recon-gen==${TAG} from TestPyPI"
            if /tmp/qs-verify-testpypi/bin/pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "recon-gen==${TAG}"; then
              echo "Install succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Install failed; sleeping 30s before retry..."
            sleep 30
          done
          echo "::error::pip install recon-gen==${TAG} from TestPyPI failed after 6 attempts (3 min total)"
          exit 1

      - name: Verify CLI version flag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          OUT=$(/tmp/qs-verify-testpypi/bin/recon-gen --version)
          echo "${OUT}"
          echo "${OUT}" | grep -q "${TAG}" || { echo "::error::--version output missing tag ${TAG}"; exit 1; }

      - name: Smoke import the public surface
        run: |
          /tmp/qs-verify-testpypi/bin/python -c "
          from recon_gen.common.tree import App, Sheet
          from recon_gen.common.tree.visuals import KPI, Table, BarChart, Sankey
          from recon_gen.common.tree.filters import FilterGroup
          from recon_gen.common.tree.actions import Drill
          from recon_gen.common.dataset_contract import DatasetContract, ColumnSpec
          from recon_gen.common.config import Config
          from recon_gen.apps.l1_dashboard.app import build_l1_dashboard_app
          from recon_gen.apps.l2_flow_tracing.app import build_l2_flow_tracing_app
          from recon_gen.apps.investigation.app import build_investigation_app
          from recon_gen.apps.executives.app import build_executives_app
          print('public surface importable')
          "

      - name: Verify quicksight-gen shim installs + transitively pulls recon-gen
        # AC.F.1 / AC.F.2 — the shim's `pip install quicksight-gen` path
        # must keep working transparently during the 1-2 month grace
        # window. Verify: fresh venv, install the shim from TestPyPI,
        # confirm (a) the shim wheel installed, (b) recon-gen was
        # pulled in transitively, (c) `import quicksight_gen` fires the
        # DeprecationWarning, (d) the `recon-gen` CLI binary is on PATH.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/shim-verify-testpypi
          /tmp/shim-verify-testpypi/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: pip install quicksight-gen==${TAG} from TestPyPI"
            if /tmp/shim-verify-testpypi/bin/pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "quicksight-gen==${TAG}"; then
              echo "Shim install succeeded on attempt ${attempt}"
              break
            fi
            echo "Install failed; sleeping 30s before retry..."
            sleep 30
            if [ ${attempt} -eq 6 ]; then
              echo "::error::pip install quicksight-gen==${TAG} from TestPyPI failed after 6 attempts"
              exit 1
            fi
          done
          # Confirm DeprecationWarning fires AND recon-gen is reachable
          OUT=$(/tmp/shim-verify-testpypi/bin/python -W default -c "import quicksight_gen" 2>&1)
          echo "${OUT}"
          echo "${OUT}" | grep -q "DeprecationWarning" || {
            echo "::error::shim import did not fire DeprecationWarning"; exit 1;
          }
          echo "${OUT}" | grep -q "recon-gen" || {
            echo "::error::DeprecationWarning text missing 'recon-gen' migration hint"; exit 1;
          }
          # Confirm transitive recon-gen install dropped the CLI binary
          /tmp/shim-verify-testpypi/bin/recon-gen --version
          echo "shim verified: install + warning + transitive recon-gen all green"

  # ---------------------------------------------------------------------------
  # W.8 — auto-gate prod PyPI on a live AWS QuickSight e2e run against the
  # just-published TestPyPI wheel. publish-pypi needs this job, so a
  # failing e2e blocks the prod publish. The pypi environment's manual
  # approver (if configured) is still honored — set as the operator's
  # human fast-path when they want to ship before e2e finishes.
  #
  # Resource prefix: ``qs-release-${tag}`` keeps the deployed AWS
  # resources traceable to the release that produced them (vs. the
  # ``qs-ci-${run_id}-pg`` prefix the standalone e2e workflow uses).
  # Cleanup is in-job (`if: always()`) — the standalone e2e workflow's
  # cleanup-pg can't help here because release.yml runs in its own
  # workflow scope.
  # ---------------------------------------------------------------------------
  e2e-against-testpypi:
    name: E2E vs TestPyPI wheel
    needs: verify-testpypi-install
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      # gate.l.8 — `gh run list` (the "last one stops the cluster" guard
      # on the Stop step below) needs `actions: read`.
      actions: read
    # gate.l.8 — OWN concurrency group, NOT the shared `e2e-pg`.
    #
    # The bug this fixes: `e2e-pg` is shared by e2e.yml's push:main PG
    # jobs (`e2e-pg-api` etc.). When you cut a release you push the
    # merge-to-main and the tag at nearly the same time, so this job
    # (pending behind whatever e2e.yml job grabbed `e2e-pg` first) and a
    # *second* push's `e2e-pg-api` both become pending in `e2e-pg` — and
    # GitHub keeps only the LATEST pending run per group, evicting the
    # older one. The older one is usually this release-e2e gate → it gets
    # cancelled → `publish-pypi` (which `needs:` it) is skipped → the
    # release never reaches PyPI. (v8.8.0a18 and v8.8.0a19 both died this
    # way.) `cancel-in-progress: false` does NOT prevent this — it only
    # protects the *in-progress* run, not pending ones.
    #
    # With its own group, this job is never the evictable pending run.
    # Trade-off: it can now run concurrently with e2e.yml's `e2e-pg-api`
    # / `cleanup-pg`. Safe because (a) it deploys to a unique table
    # prefix (cfg.db_table_prefix = `rel_<safe-tag>` — disjoint from
    # e2e.yml's `sp_pg_aw_*` and `cleanup-pg`'s `spec_example_*`) and a
    # unique QS `deployment_name` (`qs-release-<tag>`); (b) the
    # only shared resource left is the Aurora cluster's running state,
    # which the "last one stops the cluster" guard on the Stop step
    # handles (a residual few-second TOCTOU window remains — acceptable).
    concurrency:
      group: e2e-pg-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install from TestPyPI (with retries for CDN propagation)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/qs-release-e2e
          /tmp/qs-release-e2e/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: pip install recon-gen==${TAG} from TestPyPI"
            if /tmp/qs-release-e2e/bin/pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "recon-gen[deploy,demo,audit,e2e]==${TAG}"; then
              echo "Install succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Install failed; sleeping 30s before retry..."
            sleep 30
          done
          echo "::error::pip install recon-gen==${TAG} from TestPyPI failed after 6 attempts (3 min total)"
          exit 1

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # gate.l.7 — resilient cluster bring-up. Tolerates a sibling job's
      # in-flight `stopping` (the old `start || true; wait available`
      # deadlocked there: it hit v8.8.0a18's release). Since gate.l.8 put
      # this job in its own concurrency group, a concurrent e2e.yml run's
      # `cleanup-pg::Stop PG cluster` could `stop` the cluster mid-run —
      # the "last one stops the cluster" guard on both Stop steps + this
      # tolerant bring-up keep that from biting. No-op when the secret is
      # unset (pre-gate.l shape).
      - name: Ensure PG cluster available (gate.l.7)
        uses: ./.github/actions/ensure-rds-available
        with:
          cluster-id: ${{ secrets.QS_GEN_AWS_PG_CLUSTER_ID }}

      - name: Use bundled L2 instance directly (Z.C — L2 no longer carries a prefix)
        # gate.l.8 + Z.C — this job is in its own concurrency group, so
        # it can run alongside e2e.yml's `e2e-pg-api` and
        # `cleanup-pg::schema clean`. Pre-Z.C this step rewrote the L2
        # yaml's `instance:` field to `rel_<safe-tag>`; under Z.C the L2
        # yaml has no `instance:` field at all (rejected at load), so
        # disjointness comes from the per-run cfg's `db_table_prefix`
        # below.
        run: |
          cp tests/l2/spec_example.yaml /tmp/release-l2.yaml
          head -3 /tmp/release-l2.yaml

      - name: Generate per-run config.yaml
        # Z.C — `deployment_name` (QS resource ID prefix) carries the
        # release tag for traceability; the `Deployment` AWS tag on every
        # deployed resource makes `json clean` scope-safe.
        # `db_table_prefix` (DB-table prefix) carries an underscored
        # variant so this release's tables are disjoint from
        # `spec_example_*` and any concurrent CI cells. AWS QS dashboard
        # IDs match `[\w\-]+` (no dots), so collapse `v8.6.4` → `v8-6-4`
        # for deployment_name and `v8_6_4` for db_table_prefix.
        run: |
          SAFE_TAG="${GITHUB_REF_NAME//./-}"
          DB_SAFE_TAG="${GITHUB_REF_NAME//[.\/-]/_}"   # v8.8.0a20 -> v8_8_0a20
          cat > /tmp/release-e2e.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-release-${SAFE_TAG}"
          db_table_prefix: "rel_${DB_SAFE_TAG}"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF

      - name: Apply schema (DDL)
        run: /tmp/qs-release-e2e/bin/recon-gen schema apply -c /tmp/release-e2e.yaml --l2 /tmp/release-l2.yaml --execute

      - name: Apply seed data
        run: /tmp/qs-release-e2e/bin/recon-gen data apply -c /tmp/release-e2e.yaml --l2 /tmp/release-l2.yaml --execute

      - name: Refresh matviews
        run: /tmp/qs-release-e2e/bin/recon-gen data refresh -c /tmp/release-e2e.yaml --l2 /tmp/release-l2.yaml --execute

      - name: Deploy QS resources
        run: /tmp/qs-release-e2e/bin/recon-gen json apply -c /tmp/release-e2e.yaml --l2 /tmp/release-l2.yaml -o /tmp/release-e2e-out --execute

      - name: Run API e2e against TestPyPI wheel
        # Same 3 apps as the standalone e2e-pg-api job.
        #
        # gate.l.8 — `RECON_GEN_TEST_L2_INSTANCE` MUST point at the same
        # synthesized `/tmp/release-l2.yaml` the deploy steps above used
        # (`--l2 /tmp/release-l2.yaml`). Otherwise the conftest fixtures
        # derive the expected QS resource IDs from `cfg.default_l2_instance`
        # (unset → bundled `spec_example`), look for
        # `qs-release-<tag>-spec_example-*`, find nothing, and every
        # `test_*_deployed_resources.py` / `_dashboard_structure.py` test
        # fails — exactly what broke v8.8.0a20's release.
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/release-e2e.yaml
          RECON_GEN_TEST_L2_INSTANCE: /tmp/release-l2.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          # AB.7.1a — coverage from the release-gate API e2e.
          COVERAGE_FILE: .coverage.release-e2e-api
        run: |
          /tmp/qs-release-e2e/bin/pytest \
            tests/e2e/test_l1_deployed_resources.py \
            tests/e2e/test_l1_dashboard_structure.py \
            tests/e2e/test_inv_deployed_resources.py \
            tests/e2e/test_inv_dashboard_structure.py \
            tests/e2e/test_exec_deployed_resources.py \
            tests/e2e/test_exec_dashboard_structure.py \
            -m api -v -n auto \
            --cov=recon_gen

      - name: Install Playwright WebKit browser
        # The TestPyPI install above pulls the ``e2e`` extra (playwright
        # the Python package), but the WebKit browser binary isn't
        # bundled with the wheel — install it explicitly into the same
        # venv. ``--with-deps`` apt-installs the WebKit system libs on
        # the Ubuntu runner (libsoup3 / libwebkitgtk-6.0 / …); without
        # it every browser page-open fails with "Host system is missing
        # dependencies to run browsers" (seen in the 2026-05-04 nightly).
        run: /tmp/qs-release-e2e/bin/playwright install --with-deps webkit

      - name: Run browser e2e against TestPyPI wheel (renders + sheet visuals + filters + drilldown)
        # X.2.i.followon (2026-05-12): the release gate now runs the FULL
        # browser tier (parity with e2e.yml's ``e2e-pg-browser``, which
        # fires on every push:main). Rationale: now that App2 (the HTMX
        # renderer) is the offline-iteration path and X.2.j's 4-way
        # cross-tool agreement gate is landing, "the deployed QS dashboard
        # renders every visual" is a release-blocking invariant — a prod
        # publish should not ship past a blank-dashboard regression that
        # the structure tests can't see. Costs ~+20 min vs the API-only
        # gate; that's the deliberate trade for not shipping a broken
        # dashboard. (Earlier this step was skipped "for fast feedback";
        # that trade is reversed.) File list mirrors e2e.yml — keep in
        # sync (see ``feedback_ci_release_workflow_parity``).
        #
        # The parametrized ``[qs, app2]`` files (``test_*_filters`` /
        # ``test_*_sheet_visuals`` / ``test_l2ft_*_dropdowns`` /
        # ``test_dashboard_driver``) run both legs: ``qs`` against the
        # just-deployed dashboards, ``app2`` against a local server
        # reading the same seeded release DB (``RECON_GEN_CONFIG`` carries
        # the URL). ``RECON_GEN_TEST_L2_INSTANCE`` MUST stay pointed at
        # ``/tmp/release-l2.yaml`` (same reason as the API step above).
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/release-e2e.yaml
          RECON_GEN_TEST_L2_INSTANCE: /tmp/release-l2.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          RECON_E2E_PAGE_TIMEOUT: "60000"
          # AB.7.1a — coverage from the release-gate browser e2e.
          COVERAGE_FILE: .coverage.release-e2e-browser
        run: |
          /tmp/qs-release-e2e/bin/pytest \
            tests/e2e/test_l1_dashboard_renders.py \
            tests/e2e/test_l1_sheet_visuals.py \
            tests/e2e/test_l1_filters.py \
            tests/e2e/test_inv_dashboard_renders.py \
            tests/e2e/test_inv_sheet_visuals.py \
            tests/e2e/test_inv_filters.py \
            tests/e2e/test_inv_drilldown.py \
            tests/e2e/test_exec_dashboard_renders.py \
            tests/e2e/test_exec_sheet_visuals.py \
            tests/e2e/test_l2ft_rails_dropdowns.py \
            tests/e2e/test_l2ft_chains_dropdowns.py \
            tests/e2e/test_l2ft_templates_dropdowns.py \
            tests/e2e/test_dashboard_driver.py \
            tests/e2e/test_l1_cross_sheet_drill_date_widening.py \
            tests/e2e/test_l2ft_metadata_cascade.py \
            -m browser -v -n 2 \
            --cov=recon_gen

      # X.2.j — the 4-way cross-tool agreement test, separate invocation
      # (its ``seeded_audit`` fixture re-applies the prefixed schema +
      # re-plants — can't share a worker pool with the render tests
      # above; runs last). Against the just-published TestPyPI wheel +
      # the release-synthesized L2 instance. The QS leg runs iff the
      # ``<deployment_name>-l1-dashboard`` happens to be
      # deployed for this run; otherwise it self-skips and the gate is
      # the 3-way ``scenario ⊆ direct == App2`` + PDF — still a real
      # prod-publish gate (the wheel's App2 renderer / audit PDF must
      # agree with the matview). File list mirrors e2e.yml — keep in
      # sync (feedback_ci_release_workflow_parity).
      - name: Run 4-way cross-tool agreement test (re-seeds the prefixed schema)
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/release-e2e.yaml
          RECON_GEN_TEST_L2_INSTANCE: /tmp/release-l2.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          RECON_E2E_PAGE_TIMEOUT: "60000"
          # AB.7.1a — coverage from the canonical release-gate path.
          COVERAGE_FILE: .coverage.release-e2e-4way
        run: |
          /tmp/qs-release-e2e/bin/pytest \
            tests/e2e/test_audit_dashboard_agreement.py \
            -m browser -v -k postgres \
            --cov=recon_gen

      # AB.7.1a — upload all three e2e coverage files from this job
      # (api + browser + 4way) so the release-coverage aggregator can
      # combine them with the unit + smoke legs.
      - name: Upload e2e coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-release-e2e
          path: .coverage.release-e2e-*
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-against-testpypi-screenshots-${{ github.run_id }}
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          /tmp/qs-release-e2e/bin/recon-gen json clean -c /tmp/release-e2e.yaml --l2 /tmp/release-l2.yaml -o /tmp/empty-out --execute || true
          /tmp/qs-release-e2e/bin/recon-gen schema clean -c /tmp/release-e2e.yaml --l2 /tmp/release-l2.yaml --execute || true

      # gate.l.8 — stop the cluster after release-e2e cleanup, BUT only
      # if no other E2E / Release run is still using it ("last one stops
      # the cluster"). Since gate.l.8 gave this job its own concurrency
      # group, a concurrent e2e.yml run could be mid-deploy on the same
      # Aurora; stopping it would kill those connections. Whoever
      # finishes alone stops it; the operator's `./run_tests.sh down aws`
      # is the backstop. Async on the RDS side; `ensure-rds-available`
      # tolerates the resulting `stopping` state. No-op when the secret
      # is unset (pre-gate.l shape).
      - name: Stop PG cluster (gate.l.8)
        env:
          PG_CLUSTER_ID: ${{ secrets.QS_GEN_AWS_PG_CLUSTER_ID }}
          GH_TOKEN: ${{ github.token }}
        if: always() && env.PG_CLUSTER_ID != ''
        run: |
          # `|| echo 1`: if `gh run list` fails, assume others might be
          # running → DON'T stop the cluster (prefer a cost leak the
          # operator's `down aws` mops up over killing a sibling run).
          others=$(gh run list --limit 50 --json status,workflowName,databaseId \
            --jq '[.[] | select((.status=="in_progress" or .status=="queued") and (.workflowName=="E2E" or .workflowName=="Release") and (.databaseId != ${{ github.run_id }}))] | length' || echo 1)
          if [ "${others:-0}" -gt 0 ]; then
            echo "::notice::${others} other E2E/Release run(s) in progress — leaving the PG cluster up (last one stops it)."
            exit 0
          fi
          echo "No other E2E/Release runs in progress — stopping PG cluster ${PG_CLUSTER_ID}."
          aws rds stop-db-cluster --db-cluster-identifier "$PG_CLUSTER_ID" || true

  # ---------------------------------------------------------------------------
  # Publish to PyPI (gated on TestPyPI install verify + e2e gate +
  # manual environment approval if configured)
  # ---------------------------------------------------------------------------
  # AB.7.1a — combine coverage data uploaded by every release leg
  # (unit + smoke + e2e API + e2e browser + 4-way agreement) into
  # ONE release-wide report. Runs in parallel with publish-pypi
  # (not a publish gate — coverage failure shouldn't block the
  # publish). `github-release` depends on this so the aggregated
  # coverage.xml + htmlcov.zip land in the release asset list.
  release-coverage:
    name: Combine + report release coverage
    needs: [tests, smoke, e2e-against-testpypi]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (just coverage tooling)
        run: uv sync --frozen --extra dev

      - name: Download all coverage data artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data files
        run: .venv/bin/coverage combine || true

      - name: Render markdown report (Step Summary + artifact)
        run: |
          {
            echo "# Coverage report — release ${GITHUB_REF_NAME}"
            echo ""
            echo "_Combined from unit + smoke (installed wheel) + e2e API + e2e browser + 4-way agreement on commit ${GITHUB_SHA:0:7}._"
            echo ""
            .venv/bin/coverage report --format=markdown || echo "(no coverage data)"
          } > coverage-report.md
          cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Render terminal report (for the job log)
        run: .venv/bin/coverage report || true

      - name: Generate HTML report
        run: .venv/bin/coverage html -d htmlcov || true

      - name: Generate XML report
        run: .venv/bin/coverage xml -o coverage.xml || true

      - name: Bundle HTML report into release-asset zip
        # softprops/action-gh-release upload contract is "1 file per
        # asset"; zip the htmlcov tree so it lands as ONE
        # downloadable bundle on the release page.
        run: |
          if [ -d htmlcov ]; then
            zip -r coverage-html.zip htmlcov/ >/dev/null
            ls -la coverage-html.zip
          fi

      - name: Upload combined report artifacts (for github-release job)
        uses: actions/upload-artifact@v7
        with:
          name: release-coverage-${{ github.run_id }}
          path: |
            coverage.xml
            coverage-html.zip
            coverage-report.md
          if-no-files-found: warn
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: [verify-testpypi-install, e2e-against-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/recon-gen
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Verify the just-published prod PyPI release actually installs.
  #
  # Symmetric to verify-testpypi-install: poll the prod PyPI index until
  # the new version is fetchable, install into a fresh venv, prove the
  # CLI works and the public surface imports. github-release depends on
  # this so a half-published package can't ship a GitHub Release.
  # ---------------------------------------------------------------------------
  verify-pypi-install:
    name: Verify PyPI install
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install from PyPI (with retries for CDN propagation)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/qs-verify-pypi
          /tmp/qs-verify-pypi/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: pip install recon-gen==${TAG} from PyPI"
            if /tmp/qs-verify-pypi/bin/pip install "recon-gen==${TAG}"; then
              echo "Install succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Install failed; sleeping 30s before retry..."
            sleep 30
          done
          echo "::error::pip install recon-gen==${TAG} from PyPI failed after 6 attempts (3 min total)"
          exit 1

      - name: Verify CLI version flag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          OUT=$(/tmp/qs-verify-pypi/bin/recon-gen --version)
          echo "${OUT}"
          echo "${OUT}" | grep -q "${TAG}" || { echo "::error::--version output missing tag ${TAG}"; exit 1; }

      - name: Smoke import the public surface
        run: |
          /tmp/qs-verify-pypi/bin/python -c "
          from recon_gen.common.tree import App, Sheet
          from recon_gen.common.tree.visuals import KPI, Table, BarChart, Sankey
          from recon_gen.common.tree.filters import FilterGroup
          from recon_gen.common.tree.actions import Drill
          from recon_gen.common.dataset_contract import DatasetContract, ColumnSpec
          from recon_gen.common.config import Config
          from recon_gen.apps.l1_dashboard.app import build_l1_dashboard_app
          from recon_gen.apps.l2_flow_tracing.app import build_l2_flow_tracing_app
          from recon_gen.apps.investigation.app import build_investigation_app
          from recon_gen.apps.executives.app import build_executives_app
          print('public surface importable')
          "

  # ---------------------------------------------------------------------------
  # GitHub Release with sdist + wheel + sample bundle
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    # AB.7.1a — also depend on release-coverage so the aggregated
    # report lands in the release asset list. `release-coverage` is
    # `if: always()` so a failed coverage leg doesn't block the
    # release (the dist/ assets are still ready); github-release
    # picks up whatever coverage data made it through.
    needs: [verify-pypi-install, release-coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # AB.7.1a — pull the aggregated coverage report so it can attach
      # to the GitHub Release. `continue-on-error` so a missing
      # artifact (zero-leg-passed) doesn't fail the release itself.
      - name: Download release coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: release-coverage-${{ github.run_id }}
          path: release-coverage/

      - name: Extract release notes for ${{ github.ref_name }}
        run: |
          # Match `## <tag>` whether the line is bare (`## v6.2.1`) or
          # carries a descriptive suffix (`## v6.2.1 — short title`).
          # The earlier exact-equality check (`$0 == "## " tag`) only
          # caught the bare form, so v6.x releases shipped placeholder
          # bodies. Field-2 match handles both shapes.
          awk -v tag="${GITHUB_REF_NAME}" '
            /^## v/ {
              if (capture) exit
              if ($1 == "##" && $2 == tag) { capture = 1; next }
            }
            /^---[[:space:]]*$/ { if (capture) exit }
            capture { print }
          ' RELEASE_NOTES.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::warning::No release notes section found for ${GITHUB_REF_NAME} in RELEASE_NOTES.md"
            echo "Release ${GITHUB_REF_NAME}" > release-body.md
          fi
          echo "----- release body preview -----"
          cat release-body.md
          echo "--------------------------------"

      - name: Detect PEP 440 pre-release suffix
        id: prerelease
        # softprops/action-gh-release auto-detects only semver hyphen
        # suffixes (``v1.0.0-alpha.1``); PEP 440 ``v8.8.0a1`` slips
        # past as a stable release. Compute the flag from the tag's
        # last char: digits-after-something-non-digit-suffix means
        # alpha/beta/rc. ``make_latest`` mirrors the inversion so a
        # pre-release doesn't displace the current stable in the
        # "Latest" badge.
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" =~ ([ab]|rc)[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
            echo "make_latest=false"  >> "${GITHUB_OUTPUT}"
            echo "Detected pre-release tag: ${TAG}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
            echo "make_latest=true"   >> "${GITHUB_OUTPUT}"
            echo "Stable release tag: ${TAG}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          make_latest: ${{ steps.prerelease.outputs.make_latest }}
          # AB.7.1a — also attach the aggregated coverage assets.
          # `coverage-report.md` is the markdown table; `coverage.xml`
          # is the Cobertura-format XML; `coverage-html.zip` bundles
          # the navigable HTML report. Missing files (zero-leg-passed)
          # are tolerated because `fail_on_unmatched_files: false`.
          files: |
            dist/*.whl
            dist/*.tar.gz
            release-coverage/coverage.xml
            release-coverage/coverage-html.zip
            release-coverage/coverage-report.md
          fail_on_unmatched_files: false
