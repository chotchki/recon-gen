# Browser e2e in GitHub Actions (Phase W).
#
# Trigger model — `workflow_dispatch` + `push:main` only.
# DELIBERATELY no `pull_request` trigger. Rationale:
#
#   1. This is a solo-dev repo; the user pushes directly to main, no
#      PRs from forks to defend against.
#   2. Even if PRs become a thing later, this workflow exposes
#      `secrets.QS_GEN_PG_URL`, `secrets.QS_GEN_ORACLE_URL`,
#      `secrets.RECON_E2E_USER_ARN`, AND assumes the `qs-gen-ci` IAM role
#      via OIDC. Letting it run on `pull_request` from a fork would
#      let attackers exfiltrate every one of those by editing the
#      workflow YAML in their PR. The right pattern there is
#      `pull_request_target` + maintainer label gate, which adds
#      complexity for zero current value.
#   3. If you reach for a `pull_request` trigger here, stop and revisit
#      Phase W's "Locked decisions" block in PLAN.md first.
#
# Setup runbook for the secrets + OIDC role + ci-bot QS user this
# workflow depends on lives in `.github/E2E_SETUP.md`.

name: E2E

# Auto-fire re-enabled v8.4.0: ResourcePrefix-tag isolation now
# scopes cleanup to the workflow's own ``qs-ci-${run_id}-pg``
# resources. A local deploy with a different ``resource_prefix``
# (e.g. ``qs-gen-postgres``) is no longer swept — its resources
# carry a different ``ResourcePrefix`` tag value AND the cleanup
# filter is fail-closed on missing tag (pre-v8.4.0 deploys are
# untouched until they're re-deployed under v8.4.0+).
#
# DELIBERATELY no `pull_request` trigger — see header comment
# rationale on the v8.3.x version of this file (preserved in git
# history). PR triggers from forks would expose
# ``secrets.QS_GEN_PG_URL`` / ``QS_GEN_ORACLE_URL`` /
# ``QS_E2E_USER_ARN`` / ``AWS_ROLE_ARN``.
on:
  workflow_dispatch:
  push:
    branches: [main]
  # W.6 — nightly browser-tier sweep. Cron is 6am UTC daily so the
  # browser run completes before the typical workday starts (US
  # Eastern). X.2.i.followon (2026-05-12): ``e2e-pg-browser`` now ALSO
  # fires on push:main (and release.yml's TestPyPI gate runs the same
  # tier) — see the rationale block on the ``e2e-pg-browser`` job. The
  # cron stays as a safety net for the "no push that day" case.
  schedule:
    - cron: '0 6 * * *'

# OIDC requires `id-token: write` on the workflow (or job) so the
# runner can mint the JWT that AWS exchanges for temporary creds.
# `contents: read` keeps the rest of the workflow least-privileged.
permissions:
  id-token: write
  contents: read
  # gate.l.8 — `cleanup-pg`'s "last one stops the cluster" guard runs
  # `gh run list`, which needs `actions: read`. Workflow-wide is fine —
  # it's read-only and the other jobs don't mind.
  actions: read

jobs:
  # W.1 — auth smoke. First job in the workflow: assume the OIDC role,
  # confirm AWS sees us, exit. Proves the trust policy + role + GHA
  # OIDC config all line up before any downstream job touches QS / DB
  # / Playwright. ~30s.
  auth-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Confirm role assumption
        run: aws sts get-caller-identity

  # W.3 — smallest wedge: full deploy + L1 API e2e against the user's
  # external Postgres. Depends on auth-smoke as a quick gate so we don't
  # burn ~10 min on a deploy when the OIDC chain is broken.
  #
  # Per-run isolation via ``resource_prefix: qs-ci-${{ github.run_id }}-pg``.
  # Each CI run carries its own prefix, so dashboards/datasets it deploys
  # are uniquely named within the QS account. Caveat (W.2 known gap):
  # ``json clean`` filters by ``L2Instance`` tag, NOT by ResourcePrefix —
  # so if you have a local deploy of the same L2 instance (spec_example)
  # open during a CI run, the workflow's cleanup step will sweep your
  # local deploy too. Solo-dev reality: don't run a local deploy of
  # spec_example while CI is running. Follow-up: extend cleanup to
  # filter by ResourcePrefix tag for true per-run isolation (queue
  # before W.5 scaling fans out concurrent jobs).
  # W.5 — scaled API job. Single deploy + run every API test the four
  # bundled apps ship (L1 + Investigation + Executives — L2FT has no
  # API e2e tests). One ``schema apply`` + ``data apply`` + ``json
  # apply`` produces every dashboard the tests need; pytest then runs
  # all the ``test_<app>_deployed_resources.py`` +
  # ``test_<app>_dashboard_structure.py`` files in one invocation
  # with ``pytest-xdist -n auto`` so the per-app modules execute in
  # parallel within the single job (avoids 3× deploy cost vs.
  # matrix-of-jobs).
  e2e-pg-api:
    needs: auth-smoke
    runs-on: ubuntu-latest
    # Serialize PG e2e jobs across runs. ``schema apply --execute``
    # drops + recreates the L2 instance's tables; concurrent runs
    # would race on the same ``spec_example_*`` table set against
    # the user's external Aurora. ``cancel-in-progress: false`` lets
    # the in-flight run finish (and clean up) before the next starts.
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # Extras: ``deploy`` for boto3+botocore[crt], ``demo`` for
        # psycopg2, ``audit`` for the seed pipeline (data apply pulls
        # in the audit-generated baseline plants), ``e2e`` for pytest +
        # pytest-xdist + boto3-stubs, ``dev`` for pytest-cov (AB.7.1a
        # coverage aggregation). Skip ``[docs]``. Skip
        # ``playwright install`` — API tests don't render anything.
        run: uv sync --frozen --extra deploy --extra demo --extra audit --extra e2e --extra dev

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Y.2.gate.l.7 — resilient cluster bring-up. Handles a sibling
      # job's in-flight `stopping` (the pre-l.4 `start || true; wait
      # available` deadlocked there) and only issues `start` when the
      # cluster is truly `stopped`. No-op when the secret is unset
      # (pre-gate.l shape — the job runs against whatever
      # `secrets.QS_GEN_PG_URL` points at). Teardown moved to
      # `cleanup-pg` (runs after both PG jobs) so the cluster isn't
      # stopped between e2e-pg-api and e2e-pg-browser.
      - name: Ensure PG cluster available (gate.l.7)
        uses: ./.github/actions/ensure-rds-available
        with:
          cluster-id: ${{ secrets.QS_GEN_AWS_PG_CLUSTER_ID }}

      - name: Generate per-run config.yaml
        # ``resource_prefix`` carries the unique GHA run ID so CI runs
        # don't trample each other's QS resources. ``principal_arns``
        # includes the ci-bot ARN so embed-URL generation in W.6 has a
        # user with permission to view the dashboards (Path A — bot's
        # access is per-deploy, not account-wide ADMIN).
        run: |
          cat > /tmp/ci-pg.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-ci-${{ github.run_id }}-pg"
          db_table_prefix: "qs_ci_${{ github.run_id }}_pg"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF

      - name: Apply schema (DDL)
        run: .venv/bin/recon-gen schema apply -c /tmp/ci-pg.yaml --execute

      - name: Apply seed data
        run: .venv/bin/recon-gen data apply -c /tmp/ci-pg.yaml --execute

      - name: Refresh matviews
        run: .venv/bin/recon-gen data refresh -c /tmp/ci-pg.yaml --execute

      - name: Deploy QS resources (theme + datasource + datasets + analyses + dashboards)
        run: .venv/bin/recon-gen json apply -c /tmp/ci-pg.yaml -o /tmp/ci-pg-out --execute

      - name: Run API e2e (L1 + Investigation + Executives)
        # ``-n auto`` lets xdist spread the 3 apps' test files across
        # the runner's vCPU count (typically 2 on the standard
        # ubuntu-latest tier). ``-m api`` filters out browser-marked
        # tests that may be co-located in the same files. Failure of
        # any one app's tests fails the job, but other apps still run
        # under xdist's per-worker isolation so the failure manifest
        # captures every problem in one go.
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/ci-pg.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          # AB.7.1a — coverage from the e2e-pg-api leg. `--cov` measures
          # the cli/apps/schema/seed paths exercised by deploy + walk.
          # `COVERAGE_FILE` keeps this leg's data distinct from sibling
          # legs so the aggregator's `coverage combine` merges by name.
          COVERAGE_FILE: .coverage.e2e-pg-api
        run: |
          .venv/bin/pytest \
            tests/e2e/test_l1_deployed_resources.py \
            tests/e2e/test_l1_dashboard_structure.py \
            tests/e2e/test_inv_deployed_resources.py \
            tests/e2e/test_inv_dashboard_structure.py \
            tests/e2e/test_exec_deployed_resources.py \
            tests/e2e/test_exec_dashboard_structure.py \
            -m api -v -n auto \
            --cov=recon_gen

      # W.8a — perf snapshot. Dump pg_stat_statements top-N queries
      # touching our test schema BEFORE cleanup drops the schema —
      # the script tolerates the missing extension / permission case
      # by writing a "skipped" marker, so this step never fails the
      # job.
      - name: Dump top expensive queries
        if: always()
        run: |
          .venv/bin/python scripts/dump_top_queries.py \
            -c /tmp/ci-pg.yaml \
            -o /tmp/top-queries-pg-api.md \
            --top 50 \
            --title "Top expensive PG queries — e2e-pg-api"

      - name: Upload top-queries artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pg-api-top-queries-${{ github.run_id }}
          path: /tmp/top-queries-pg-api.md
          if-no-files-found: ignore
          retention-days: 14

      # AB.7.1a — upload .coverage.e2e-pg-api so the workflow's
      # `coverage` aggregator job can combine it with sibling legs.
      # `if: always()` because partial coverage from a failing run is
      # still useful triage data.
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-e2e-pg-api
          path: .coverage.e2e-pg-api
          if-no-files-found: ignore
          retention-days: 7

      # ``if: always()`` runs even if any prior step (or the test
      # itself) failed. The ``|| true`` on each clean call prevents a
      # cleanup failure (e.g. a partially-deployed resource that
      # doesn't exist yet) from masking the real test failure.
      # ``-o /tmp/empty-out`` (a directory we never write to) makes
      # ``json clean`` sweep every ``ManagedBy:recon-gen``
      # resource (scoped by ResourcePrefix=qs-ci-${run_id}-pg post
      # v8.4.0) since none are "in" the empty out dir.
      #
      # This per-job cleanup catches the common path (test failed,
      # step failed). It does NOT catch the runner being killed
      # mid-job (GHA hard timeout, OOM, manual cancel). The W.7
      # ``cleanup-pg`` job below is the belt-and-suspenders for
      # those cases.
      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/recon-gen json clean -c /tmp/ci-pg.yaml -o /tmp/empty-out --execute || true
          .venv/bin/recon-gen schema clean -c /tmp/ci-pg.yaml --execute || true

      # gate.l.7 — cluster teardown moved to `cleanup-pg` (runs after
      # BOTH e2e-pg-api and e2e-pg-browser). Stopping it here would put
      # the cluster into `stopping` just as e2e-pg-browser starts up,
      # which deadlocked the old `start || true; wait available` step.

  # W.6 — browser-tier sweep. Runs the deeper Playwright e2e (sheet
  # visuals, filters, drilldown) against a deployed QS dashboard.
  #
  # Trigger gating: runs on ``push:main`` + ``workflow_dispatch`` +
  # ``schedule`` (nightly cron). X.2.i.followon (2026-05-12) flipped
  # this ON for push:main — rationale: now that App2 (the HTMX
  # renderer) is the offline-iteration path AND the X.2.j 4-way
  # cross-tool agreement gate is landing, "the deployed QS dashboard
  # still renders every visual" is a release-blocking invariant, not
  # an overnight nicety. The job is ~30 min and CPU-saturating, so it
  # depends on ``e2e-pg-api`` (the fast tier) — a SQL/deploy break
  # short-circuits there in ~10 min before the browser job spins up.
  # The cron stays as a safety net for days with no push to main.
  # ``release.yml::e2e-against-testpypi`` runs the same browser tier
  # against the just-published TestPyPI wheel (CI/release parity —
  # see ``feedback_ci_release_workflow_parity``).
  #
  # Concurrency: shares the ``e2e-pg`` group with ``e2e-pg-api`` so
  # the browser job and the API job never deploy concurrently into
  # the same Aurora schema. ``cleanup-pg`` waits on both.
  #
  # Resource prefix: distinct ``-browser`` suffix so the browser
  # deploy and the API deploy never alias each other's QS resources
  # (relevant when a run triggers BOTH jobs in the same workflow run —
  # they need separate resource_prefix tags so cleanup doesn't sweep
  # the wrong one).
  e2e-pg-browser:
    # X.1.c — depend on e2e-pg-api so the two PG jobs serialize within
    # a single workflow run instead of racing for the shared
    # ``e2e-pg`` concurrency group. When pg-api is queued behind a
    # prior run's cleanup-pg AND pg-browser tries to start in parallel,
    # GHA detects the deadlock (this run's pg-browser would wait on
    # this run's pg-api which is queued on a sibling) and cancels
    # pg-browser. Sequencing pg-api before pg-browser dodges that;
    # cleanup-pg already waits on both via ``needs:``.
    needs: [auth-smoke, e2e-pg-api]
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (incl. Playwright)
        # ``[e2e]`` extra brings in playwright + pytest-xdist; ``[dev]``
        # adds pytest-cov (AB.7.1a coverage aggregation). The other
        # extras match e2e-pg-api so the deploy steps work.
        run: uv sync --frozen --extra deploy --extra demo --extra audit --extra e2e --extra dev

      - name: Install Playwright WebKit browser
        # Only WebKit — that's what ``common/browser/helpers.py``
        # uses (``webkit_page`` context manager). Skipping Chromium
        # + Firefox saves ~200MB of download. ``--with-deps`` runs
        # ``apt-get install`` for the WebKit system libs (libsoup3,
        # libwebkitgtk-6.0, etc.) — without it, Ubuntu 24.04
        # runners launch Playwright but fail every page open with
        # ``Host system is missing dependencies to run browsers``,
        # cascading every browser e2e test to FAIL (seen in the
        # 2026-05-04 nightly).
        run: .venv/bin/playwright install --with-deps webkit

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # gate.l.7 — resilient cluster bring-up (mirror of e2e-pg-api).
      # `needs: e2e-pg-api` means the cluster is usually already
      # `available` here (api leaves it running; teardown is in
      # `cleanup-pg`), but a fresh-start path stays robust.
      - name: Ensure PG cluster available (gate.l.7)
        uses: ./.github/actions/ensure-rds-available
        with:
          cluster-id: ${{ secrets.QS_GEN_AWS_PG_CLUSTER_ID }}

      - name: Generate per-run config.yaml
        run: |
          cat > /tmp/ci-pg-browser.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-ci-${{ github.run_id }}-pg-browser"
          db_table_prefix: "qs_ci_${{ github.run_id }}_pg_browser"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF

      - name: Apply schema (DDL)
        run: .venv/bin/recon-gen schema apply -c /tmp/ci-pg-browser.yaml --execute

      - name: Apply seed data
        run: .venv/bin/recon-gen data apply -c /tmp/ci-pg-browser.yaml --execute

      - name: Refresh matviews
        run: .venv/bin/recon-gen data refresh -c /tmp/ci-pg-browser.yaml --execute

      - name: Deploy QS resources
        run: .venv/bin/recon-gen json apply -c /tmp/ci-pg-browser.yaml -o /tmp/ci-pg-browser-out --execute

      - name: Run browser e2e (renders + sheet visuals + filters + drilldown)
        # ``-n 2`` because the standard 2-vCPU GHA runner can't sustain
        # ``-n 4`` for browser tests without flake (verified empirically
        # — Playwright timeouts climb under contention). Bumped page
        # timeout to 60s so the slower browser-tier waits don't trip
        # on cold-start visual loads.
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/ci-pg-browser.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          RECON_E2E_PAGE_TIMEOUT: "60000"
          # AB.7.1a — coverage from the browser leg (visual render +
          # filter + drill paths).
          COVERAGE_FILE: .coverage.e2e-pg-browser
        # X.2.u.6 — file list reconciled against the parametrized
        # ``[qs, app2]`` suite. The parametrized files (``test_*_filters``,
        # ``test_*_sheet_visuals``, ``test_l2ft_*_dropdowns``,
        # ``test_dashboard_driver``) run both legs here: the ``qs`` leg
        # against the just-deployed dashboards, the ``app2`` leg against a
        # local server reading the seeded CI DB (fast, no AWS). The L2FT
        # dropdown files exercise the deployed L2FT dashboard's Rails
        # dropdowns; Chains/Templates skip cleanly on the CI L2
        # (``spec_example`` — zero chains, no fired template instances).
        # ``test_dashboard_driver`` derives its dashboard arg from the
        # ``l1_dashboard_id`` fixture (``resource_prefix``-based, not a
        # hardcoded literal).
        run: |
          .venv/bin/pytest \
            tests/e2e/test_l1_dashboard_renders.py \
            tests/e2e/test_l1_sheet_visuals.py \
            tests/e2e/test_l1_filters.py \
            tests/e2e/test_inv_dashboard_renders.py \
            tests/e2e/test_inv_sheet_visuals.py \
            tests/e2e/test_inv_filters.py \
            tests/e2e/test_inv_drilldown.py \
            tests/e2e/test_exec_dashboard_renders.py \
            tests/e2e/test_exec_sheet_visuals.py \
            tests/e2e/test_l2ft_rails_dropdowns.py \
            tests/e2e/test_l2ft_chains_dropdowns.py \
            tests/e2e/test_l2ft_templates_dropdowns.py \
            tests/e2e/test_dashboard_driver.py \
            tests/e2e/test_l1_cross_sheet_drill_date_widening.py \
            tests/e2e/test_l2ft_metadata_cascade.py \
            -m browser -v -n 2 \
            --cov=recon_gen

      # X.2.j — the 4-way cross-tool agreement test runs in its OWN
      # pytest invocation: its module-scoped ``seeded_audit`` fixture
      # re-applies the ``spec_example_*`` schema (DROP + CREATE every
      # prefixed object) + re-plants the L1-invariants scenario, so it
      # can't share a worker pool / DB session with the dashboard-render
      # tests above (which read the originally-seeded ``spec_example``
      # data through the deployed dashboard). Runs last; full 4-way here
      # — the deployed ``spec_example`` L1 dashboard supplies the QS leg.
      # File list mirrors release.yml — keep in sync (feedback_ci_release_workflow_parity).
      - name: Run 4-way cross-tool agreement test (re-seeds spec_example)
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/ci-pg-browser.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          RECON_E2E_PAGE_TIMEOUT: "60000"
          # AB.7.1a — coverage from the canonical release-gate path
          # (scenario_plants ⊆ direct == QS == App2 == PDF).
          COVERAGE_FILE: .coverage.e2e-pg-4way
        run: |
          .venv/bin/pytest \
            tests/e2e/test_audit_dashboard_agreement.py \
            -m browser -v -k postgres \
            --cov=recon_gen

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pg-browser-screenshots-${{ github.run_id }}
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      # W.8a — perf snapshot. Browser tier exercises every visual,
      # so this dump is the highest-value of the three.
      - name: Dump top expensive queries
        if: always()
        run: |
          .venv/bin/python scripts/dump_top_queries.py \
            -c /tmp/ci-pg-browser.yaml \
            -o /tmp/top-queries-pg-browser.md \
            --top 50 \
            --title "Top expensive PG queries — e2e-pg-browser"

      - name: Upload top-queries artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pg-browser-top-queries-${{ github.run_id }}
          path: /tmp/top-queries-pg-browser.md
          if-no-files-found: ignore
          retention-days: 14

      # AB.7.1a — upload coverage from BOTH browser pytest invocations
      # (the dashboard-render sweep + the 4-way agreement test). The
      # glob picks both files since they share the `.coverage.e2e-pg-`
      # prefix.
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-e2e-pg-browser
          path: .coverage.e2e-pg-*
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/recon-gen json clean -c /tmp/ci-pg-browser.yaml -o /tmp/empty-out --execute || true
          .venv/bin/recon-gen schema clean -c /tmp/ci-pg-browser.yaml --execute || true

      # gate.l.7 — cluster teardown moved to `cleanup-pg`.

  # W.5b — Oracle API leg. Mirror of ``e2e-pg-api`` against the
  # operator's external Oracle (RDS Oracle SE2 in us-east-1), pointed at
  # by the ``QS_GEN_ORACLE_URL`` secret set in W.0.b. Same 6 API test
  # files, ``-n auto``.
  #
  # Concurrency: distinct ``e2e-oracle`` group so it doesn't serialize
  # against PG runs — they're separate DBs and don't share schema, so
  # there's no contention to coordinate. Within Oracle runs the same
  # cancel-in-progress: false discipline applies (one Oracle deploy at
  # a time on the shared external DB).
  #
  # Driver: ``--extra demo-oracle`` instead of ``--extra demo`` —
  # pulls ``oracledb`` (thin client, no Instant Client install) instead
  # of ``psycopg2``. Same other extras as the PG job.
  #
  # Resource prefix: ``-oracle`` suffix so the QS resources are
  # distinct from the PG run's (no aliasing risk on the QS side, since
  # both target the same AWS account).
  e2e-oracle-api:
    needs: auth-smoke
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-oracle
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``demo-oracle`` brings in ``oracledb>=2.0`` (thin mode, no
        # Instant Client install needed). Skip ``--extra demo`` —
        # ``psycopg2`` would just sit unused on this leg. ``[dev]`` adds
        # pytest-cov (AB.7.1a coverage aggregation).
        run: uv sync --frozen --extra deploy --extra demo-oracle --extra audit --extra e2e --extra dev

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # gate.l.7 — resilient instance bring-up (Oracle is a single-
      # instance RDS, not Aurora — the composite action picks the
      # `*-db-instance` verbs from the `instance-id` input). Teardown
      # moved to `cleanup-oracle`.
      - name: Ensure Oracle instance available (gate.l.7)
        uses: ./.github/actions/ensure-rds-available
        with:
          instance-id: ${{ secrets.QS_GEN_AWS_ORACLE_INSTANCE_ID }}

      - name: Generate per-run config.yaml
        run: |
          cat > /tmp/ci-oracle.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-ci-${{ github.run_id }}-oracle"
          db_table_prefix: "qs_ci_${{ github.run_id }}_oracle"
          dialect: "oracle"
          demo_database_url: "${{ secrets.QS_GEN_ORACLE_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF

      - name: Apply schema (DDL)
        run: .venv/bin/recon-gen schema apply -c /tmp/ci-oracle.yaml --execute

      - name: Apply seed data
        run: .venv/bin/recon-gen data apply -c /tmp/ci-oracle.yaml --execute

      - name: Refresh matviews
        run: .venv/bin/recon-gen data refresh -c /tmp/ci-oracle.yaml --execute

      - name: Deploy QS resources (theme + datasource + datasets + analyses + dashboards)
        run: .venv/bin/recon-gen json apply -c /tmp/ci-oracle.yaml -o /tmp/ci-oracle-out --execute

      - name: Run API e2e (L1 + Investigation + Executives)
        env:
          RECON_GEN_E2E: "1"
          RECON_GEN_CONFIG: /tmp/ci-oracle.yaml
          RECON_E2E_USER_ARN: ${{ secrets.RECON_E2E_USER_ARN }}
          # AB.7.1a — coverage from the Oracle dialect e2e leg.
          COVERAGE_FILE: .coverage.e2e-oracle-api
        run: |
          .venv/bin/pytest \
            tests/e2e/test_l1_deployed_resources.py \
            tests/e2e/test_l1_dashboard_structure.py \
            tests/e2e/test_inv_deployed_resources.py \
            tests/e2e/test_inv_dashboard_structure.py \
            tests/e2e/test_exec_deployed_resources.py \
            tests/e2e/test_exec_dashboard_structure.py \
            -m api -v -n auto \
            --cov=recon_gen

      # W.8a — perf snapshot via v$sqlstats. The script tolerates
      # the no-permission case by writing a "skipped" marker.
      - name: Dump top expensive queries
        if: always()
        run: |
          .venv/bin/python scripts/dump_top_queries.py \
            -c /tmp/ci-oracle.yaml \
            -o /tmp/top-queries-oracle-api.md \
            --top 50 \
            --title "Top expensive Oracle queries — e2e-oracle-api"

      - name: Upload top-queries artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-oracle-api-top-queries-${{ github.run_id }}
          path: /tmp/top-queries-oracle-api.md
          if-no-files-found: ignore
          retention-days: 14

      # AB.7.1a — upload Oracle dialect's e2e coverage.
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-e2e-oracle-api
          path: .coverage.e2e-oracle-api
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/recon-gen json clean -c /tmp/ci-oracle.yaml -o /tmp/empty-out --execute || true
          .venv/bin/recon-gen schema clean -c /tmp/ci-oracle.yaml --execute || true

      # gate.l.7 — instance teardown moved to `cleanup-oracle`.

  # W.7 — workflow-level always-cleanup. Belt-and-suspenders over the
  # per-job ``Cleanup (always)`` step on ``e2e-pg-api``. The per-job
  # step catches step / test failures (the common path); this job
  # catches the runner-died cases the per-job step can't:
  #
  #   - GHA 6h hard timeout kills the runner mid-step.
  #   - Runner OOM / crash. The runner is gone; no ``if: always()``
  #     handler runs because there's nothing left to run it on.
  #   - Manual workflow cancel that interrupts the runner before its
  #     step transitions complete.
  #
  # Job-level ``if: always()`` (with ``needs: [e2e-pg-api]``) means
  # this job ALWAYS runs after the e2e job, regardless of whether the
  # e2e job succeeded, failed, or was cancelled — but only after, so it
  # never races a still-deploying job.
  #
  # Concurrency shares the ``e2e-pg`` group with ``e2e-pg-api`` /
  # ``e2e-pg-browser`` so cleanup never interleaves with *this
  # workflow's* deploys. (release.yml's ``e2e-against-testpypi`` is NOT
  # in this group anymore — gate.l.8 gave it its own — so it can overlap
  # with this cleanup; safe because it uses a disjoint table prefix
  # (``rel_<tag>_*``) and QS ``resource_prefix``, and the Stop step
  # below won't yank the cluster from under it. The within-e2e.yml lock
  # still keeps run A's ``schema clean`` from dropping ``spec_example_*``
  # tables run B is mid-INSERT into.)
  #
  # Idempotent with the per-job cleanup: ``json clean`` and
  # ``schema clean`` both no-op when the targets don't exist, so the
  # second sweep just confirms the first was complete.
  # AB.7.1a — combine coverage data uploaded by every e2e leg
  # (e2e-pg-api + e2e-pg-browser + e2e-oracle-api) into a single
  # report. Each leg uploaded ``.coverage.e2e-<leg>`` as an artifact;
  # this job downloads + `coverage combine` merges them. Renders
  # markdown to Step Summary + uploads xml/html as artifacts.
  #
  # Same shape as ci.yml's ``coverage`` job. ``if: always()`` so a
  # failed leg's partial data still surfaces — useful triage even
  # when the underlying test failed.
  coverage:
    name: Combine + report e2e coverage
    needs: [e2e-pg-api, e2e-pg-browser, e2e-oracle-api]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (just coverage tooling)
        run: uv sync --frozen --extra dev

      - name: Download all coverage data artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data files
        # Each e2e leg uploaded `.coverage.e2e-<name>`. Combine merges
        # them into a single `.coverage` data file. `|| true` so a
        # zero-leg-passed run still produces a sensible report.
        run: .venv/bin/coverage combine || true

      - name: Render markdown report (Step Summary + artifact)
        run: |
          {
            echo "# Coverage report (e2e legs)"
            echo ""
            echo "_Combined from e2e-pg-api + e2e-pg-browser (incl. 4-way agreement) + e2e-oracle-api on commit ${GITHUB_SHA:0:7}._"
            echo ""
            .venv/bin/coverage report --format=markdown || echo "(no coverage data)"
          } > coverage-report.md
          cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Render terminal report (for the job log)
        run: .venv/bin/coverage report || true

      - name: Generate HTML report
        run: .venv/bin/coverage html -d htmlcov || true

      - name: Generate XML report
        run: .venv/bin/coverage xml -o coverage.xml || true

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-e2e-${{ github.run_id }}
          path: htmlcov/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload combined XML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-e2e-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  cleanup-pg:
    needs: [e2e-pg-api, e2e-pg-browser]
    # ``if: always()`` runs even when ``e2e-pg-browser`` is skipped
    # (push:main triggers don't fire it). Skipped jobs satisfy
    # ``needs:`` as success per GHA semantics, so this job runs in
    # all trigger modes.
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``deploy`` for boto3 (json clean), ``demo`` for psycopg2
        # (schema clean drops PG tables). Skip ``audit`` / ``e2e`` —
        # cleanup doesn't need the seed pipeline or pytest.
        run: uv sync --frozen --extra deploy --extra demo

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Regenerate per-run config.yamls
        # Same shape as the e2e jobs' configs — each carries the
        # matching ``deployment_name`` so ``json clean`` filters to
        # this run's QS resources (Z.C — single-axis ``Deployment`` tag
        # isolation). One config per source job (api + browser) —
        # ``json clean`` only sweeps resources tagged with the exact
        # ``Deployment`` value the config carries.
        run: |
          cat > /tmp/ci-pg.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-ci-${{ github.run_id }}-pg"
          db_table_prefix: "qs_ci_${{ github.run_id }}_pg"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF
          cat > /tmp/ci-pg-browser.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-ci-${{ github.run_id }}-pg-browser"
          db_table_prefix: "qs_ci_${{ github.run_id }}_pg_browser"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF

      - name: Sweep QS resources + drop schema objects
        # ``|| true`` so a clean failure doesn't mask the real e2e
        # failure (which already surfaced in the prior job's status).
        # Schema clean uses the ``-pg`` config since both deploys
        # write into the same Aurora schema (l2_instance_prefix is
        # shared across runs); only the QS-side tagging differs.
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/recon-gen json clean -c /tmp/ci-pg.yaml -o /tmp/empty-out --execute || true
          .venv/bin/recon-gen json clean -c /tmp/ci-pg-browser.yaml -o /tmp/empty-out --execute || true
          .venv/bin/recon-gen schema clean -c /tmp/ci-pg.yaml --execute || true

      # gate.l.8 — cluster teardown, BUT only if no other E2E / Release
      # run is still using it ("last one stops the cluster"). gate.l.8
      # moved release.yml's `e2e-against-testpypi` out of the shared
      # `e2e-pg` group, so it can now overlap this cleanup on the same
      # Aurora — stopping the cluster mid-deploy would kill its
      # connections. Whoever finishes alone stops it; the operator's
      # `./run_tests.sh down aws` is the backstop. `|| true` swallows
      # the already-stopped case; async on the RDS side — leaves the
      # cluster `stopping`, which `ensure-rds-available` waits out.
      # No-op when the secret is unset (pre-gate.l shape).
      - name: Stop PG cluster (gate.l.8)
        env:
          PG_CLUSTER_ID: ${{ secrets.QS_GEN_AWS_PG_CLUSTER_ID }}
          GH_TOKEN: ${{ github.token }}
        if: always() && env.PG_CLUSTER_ID != ''
        run: |
          # `|| echo 1`: if `gh run list` fails, assume others might be
          # running → DON'T stop the cluster (prefer a cost leak the
          # operator's `down aws` mops up over killing a sibling run).
          others=$(gh run list --limit 50 --json status,workflowName,databaseId \
            --jq '[.[] | select((.status=="in_progress" or .status=="queued") and (.workflowName=="E2E" or .workflowName=="Release") and (.databaseId != ${{ github.run_id }}))] | length' || echo 1)
          if [ "${others:-0}" -gt 0 ]; then
            echo "::notice::${others} other E2E/Release run(s) in progress — leaving the PG cluster up (last one stops it)."
            exit 0
          fi
          echo "No other E2E/Release runs in progress — stopping PG cluster ${PG_CLUSTER_ID}."
          aws rds stop-db-cluster --db-cluster-identifier "$PG_CLUSTER_ID" || true

  # W.5b — Oracle parity for the W.7 belt-and-suspenders cleanup.
  # Same pattern as ``cleanup-pg`` but pointed at the Oracle leg's
  # config + concurrency group. Catches the same runner-died cases
  # (GHA hard timeout / OOM / cancel) the per-job ``Cleanup (always)``
  # on ``e2e-oracle-api`` can't.
  #
  # No browser sibling on the Oracle side yet — when one lands,
  # mirror ``cleanup-pg``'s multi-config sweep.
  cleanup-oracle:
    needs: [e2e-oracle-api]
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-oracle
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``deploy`` for boto3 (json clean), ``demo-oracle`` for
        # ``oracledb`` (schema clean drops Oracle tables). Skip
        # ``audit`` / ``e2e`` — cleanup doesn't need the seed pipeline
        # or pytest.
        run: uv sync --frozen --extra deploy --extra demo-oracle

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Regenerate per-run config.yaml
        run: |
          cat > /tmp/ci-oracle.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          deployment_name: "qs-ci-${{ github.run_id }}-oracle"
          db_table_prefix: "qs_ci_${{ github.run_id }}_oracle"
          dialect: "oracle"
          demo_database_url: "${{ secrets.QS_GEN_ORACLE_URL }}"
          principal_arns:
            - "${{ secrets.RECON_E2E_USER_ARN }}"
          EOF

      - name: Sweep QS resources + drop schema objects
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/recon-gen json clean -c /tmp/ci-oracle.yaml -o /tmp/empty-out --execute || true
          .venv/bin/recon-gen schema clean -c /tmp/ci-oracle.yaml --execute || true

      # gate.l.7 — sole Oracle-instance teardown (mirror of cleanup-pg's
      # cluster stop). `cleanup-oracle` `needs: e2e-oracle-api` and is
      # `if: always()`. Async on the RDS side — leaves the instance
      # `stopping`, which the next run's `ensure-rds-available` waits out.
      - name: Stop Oracle instance (gate.l.7)
        env:
          ORACLE_INSTANCE_ID: ${{ secrets.QS_GEN_AWS_ORACLE_INSTANCE_ID }}
        if: env.ORACLE_INSTANCE_ID != ''
        run: aws rds stop-db-instance --db-instance-identifier "$ORACLE_INSTANCE_ID" || true
