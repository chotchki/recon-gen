# Browser e2e in GitHub Actions (Phase W).
#
# Trigger model — `workflow_dispatch` + `push:main` only.
# DELIBERATELY no `pull_request` trigger. Rationale:
#
#   1. This is a solo-dev repo; the user pushes directly to main, no
#      PRs from forks to defend against.
#   2. Even if PRs become a thing later, this workflow exposes
#      `secrets.QS_GEN_PG_URL`, `secrets.QS_GEN_ORACLE_URL`,
#      `secrets.QS_E2E_USER_ARN`, AND assumes the `qs-gen-ci` IAM role
#      via OIDC. Letting it run on `pull_request` from a fork would
#      let attackers exfiltrate every one of those by editing the
#      workflow YAML in their PR. The right pattern there is
#      `pull_request_target` + maintainer label gate, which adds
#      complexity for zero current value.
#   3. If you reach for a `pull_request` trigger here, stop and revisit
#      Phase W's "Locked decisions" block in PLAN.md first.
#
# Setup runbook for the secrets + OIDC role + ci-bot QS user this
# workflow depends on lives in `.github/E2E_SETUP.md`.

name: E2E

# Auto-fire re-enabled v8.4.0: ResourcePrefix-tag isolation now
# scopes cleanup to the workflow's own ``qs-ci-${run_id}-pg``
# resources. A local deploy with a different ``resource_prefix``
# (e.g. ``qs-gen-postgres``) is no longer swept — its resources
# carry a different ``ResourcePrefix`` tag value AND the cleanup
# filter is fail-closed on missing tag (pre-v8.4.0 deploys are
# untouched until they're re-deployed under v8.4.0+).
#
# DELIBERATELY no `pull_request` trigger — see header comment
# rationale on the v8.3.x version of this file (preserved in git
# history). PR triggers from forks would expose
# ``secrets.QS_GEN_PG_URL`` / ``QS_GEN_ORACLE_URL`` /
# ``QS_E2E_USER_ARN`` / ``AWS_ROLE_ARN``.
on:
  workflow_dispatch:
  push:
    branches: [main]
  # W.6 — nightly browser-tier sweep. Cron is 6am UTC daily so the
  # browser run completes before the typical workday starts (US
  # Eastern). The ``e2e-pg-browser`` job is gated on
  # ``github.event_name`` so it only fires on workflow_dispatch +
  # schedule — push:main keeps the API-only fast feedback loop.
  schedule:
    - cron: '0 6 * * *'

# OIDC requires `id-token: write` on the workflow (or job) so the
# runner can mint the JWT that AWS exchanges for temporary creds.
# `contents: read` keeps the rest of the workflow least-privileged.
permissions:
  id-token: write
  contents: read

jobs:
  # W.1 — auth smoke. First job in the workflow: assume the OIDC role,
  # confirm AWS sees us, exit. Proves the trust policy + role + GHA
  # OIDC config all line up before any downstream job touches QS / DB
  # / Playwright. ~30s.
  auth-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Confirm role assumption
        run: aws sts get-caller-identity

  # W.3 — smallest wedge: full deploy + L1 API e2e against the user's
  # external Postgres. Depends on auth-smoke as a quick gate so we don't
  # burn ~10 min on a deploy when the OIDC chain is broken.
  #
  # Per-run isolation via ``resource_prefix: qs-ci-${{ github.run_id }}-pg``.
  # Each CI run carries its own prefix, so dashboards/datasets it deploys
  # are uniquely named within the QS account. Caveat (W.2 known gap):
  # ``json clean`` filters by ``L2Instance`` tag, NOT by ResourcePrefix —
  # so if you have a local deploy of the same L2 instance (spec_example)
  # open during a CI run, the workflow's cleanup step will sweep your
  # local deploy too. Solo-dev reality: don't run a local deploy of
  # spec_example while CI is running. Follow-up: extend cleanup to
  # filter by ResourcePrefix tag for true per-run isolation (queue
  # before W.5 scaling fans out concurrent jobs).
  # W.5 — scaled API job. Single deploy + run every API test the four
  # bundled apps ship (L1 + Investigation + Executives — L2FT has no
  # API e2e tests). One ``schema apply`` + ``data apply`` + ``json
  # apply`` produces every dashboard the tests need; pytest then runs
  # all the ``test_<app>_deployed_resources.py`` +
  # ``test_<app>_dashboard_structure.py`` files in one invocation
  # with ``pytest-xdist -n auto`` so the per-app modules execute in
  # parallel within the single job (avoids 3× deploy cost vs.
  # matrix-of-jobs).
  e2e-pg-api:
    needs: auth-smoke
    runs-on: ubuntu-latest
    # Serialize PG e2e jobs across runs. The runner's seed step
    # drops + recreates the variant's tables; concurrent runs would
    # race on the same `<variant>_*` table set against the user's
    # external Aurora. ``cancel-in-progress: false`` lets the in-
    # flight run finish (and clean up) before the next starts.
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # Extras: ``deploy`` for boto3+botocore[crt], ``demo`` for
        # psycopg2, ``audit`` for the seed pipeline + audit-PDF
        # render+verify in the runner's db layer, ``e2e`` for pytest +
        # pytest-xdist + boto3-stubs, ``serve`` for starlette +
        # aiosqlite (the runner's `unit` layer pulls in tests/unit/
        # test_html_*.py which import the App2 server runtime). Skip
        # ``playwright install`` — API tests don't render anything.
        run: uv sync --frozen --extra deploy --extra demo --extra audit --extra e2e --extra serve

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate per-run config.yaml
        # ``resource_prefix`` carries the unique GHA run ID so CI runs
        # don't trample each other's QS resources. ``principal_arns``
        # includes the ci-bot ARN so embed-URL generation in the
        # browser tier has a user with permission to view dashboards.
        run: |
          cat > /tmp/ci-pg.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-pg"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      # Y.2.gate.k.1.thin-wrapper (Phase 4). Runner drives the entire
      # chain: unit → db → app2 → deploy → api. Pinned to
      # `--variants=sp_pg_aw` (single named scenario × pg dialect ×
      # aw target) so we deploy ONE dashboard set per run and the
      # cleanup-pg sweep keys cleanly on ResourcePrefix tag.
      #
      # Per-cell artifacts (cmd/stdout/stderr/timings + db-perf top-
      # queries + manifest) land at runs/<run-id>/sp_pg_aw/<layer>/
      # — uploaded as workflow artifact below for triage parity with
      # local invocations.
      #
      # No QS_GEN_RUNNER_CI here: aw target is always cfg-driven, no
      # Docker spin-up to skip. CI mode only matters for lo target.
      - name: Run runner up_to=api (deploy + API e2e against Aurora)
        env:
          QS_GEN_CONFIG: /tmp/ci-pg.yaml
          QS_GEN_TEST_L2_INSTANCE: tests/l2/spec_example.yaml
          QS_E2E_USER_ARN: ${{ secrets.QS_E2E_USER_ARN }}
        run: ./run_tests.sh up_to=api --variants=sp_pg_aw

      - name: Upload runner artifacts (per-cell logs + db-perf + manifest)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pg-api-runner-${{ github.run_id }}
          path: runs/
          if-no-files-found: ignore
          retention-days: 14

      # Per-job cleanup catches the common path (test failed, step
      # failed). It does NOT catch the runner being killed mid-job
      # (GHA hard timeout, OOM, manual cancel). The W.7 ``cleanup-pg``
      # job below is the belt-and-suspenders for those cases.
      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-pg.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-pg.yaml --execute || true

  # W.6 — browser-tier sweep. Runs the deeper Playwright e2e (sheet
  # visuals, filters, drilldown) against a deployed QS dashboard.
  #
  # Trigger gating: ``workflow_dispatch`` (manual on-demand) +
  # ``schedule`` (nightly cron) only. NOT push:main — these tests
  # are CPU-saturating, run for ~30+ min, and would dominate every
  # push. Browser tier is "we want to know overnight if something
  # regressed", not "every commit needs this signal".
  #
  # Concurrency: shares the ``e2e-pg`` group with ``e2e-pg-api`` so
  # the browser job and the API job never deploy concurrently into
  # the same Aurora schema. ``cleanup-pg`` waits on both.
  #
  # Resource prefix: distinct ``-browser`` suffix so the browser
  # deploy and the API deploy never alias each other's QS resources
  # (relevant when a dispatch run triggers BOTH jobs in the same
  # workflow run — they need separate resource_prefix tags so cleanup
  # doesn't sweep the wrong one).
  e2e-pg-browser:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    # X.1.c — depend on e2e-pg-api so the two PG jobs serialize within
    # a single workflow run instead of racing for the shared
    # ``e2e-pg`` concurrency group. When pg-api is queued behind a
    # prior run's cleanup-pg AND pg-browser tries to start in parallel,
    # GHA detects the deadlock (this run's pg-browser would wait on
    # this run's pg-api which is queued on a sibling) and cancels
    # pg-browser. Sequencing pg-api before pg-browser dodges that;
    # cleanup-pg already waits on both via ``needs:``.
    needs: [auth-smoke, e2e-pg-api]
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (incl. Playwright)
        # ``[e2e]`` extra brings in playwright + pytest-xdist; the
        # other extras match e2e-pg-api so the deploy steps work.
        # ``serve`` brings starlette + aiosqlite for the runner's
        # unit layer (test_html_*.py imports App2 server runtime).
        run: uv sync --frozen --extra deploy --extra demo --extra audit --extra e2e --extra serve

      - name: Install Playwright WebKit browser
        # Only WebKit — that's what ``common/browser/helpers.py``
        # uses (``webkit_page`` context manager). Skipping Chromium
        # + Firefox saves ~200MB of download. ``--with-deps`` runs
        # ``apt-get install`` for the WebKit system libs (libsoup3,
        # libwebkitgtk-6.0, etc.) — without it, Ubuntu 24.04
        # runners launch Playwright but fail every page open with
        # ``Host system is missing dependencies to run browsers``.
        run: .venv/bin/playwright install --with-deps webkit

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate per-run config.yaml
        run: |
          cat > /tmp/ci-pg-browser.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-pg-browser"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      # Y.2.gate.k.1.thin-wrapper. Runner drives unit → db → app2 →
      # deploy → api → browser chain in one invocation. Note:
      # `up_to=browser` re-runs the api layer too (chain enforced) —
      # historically that was a separate job to deploy under a
      # `-browser` resource_prefix tag. Now: one deploy + both api +
      # browser tests against it. ResourcePrefix tag still distinct
      # via the `-browser` cfg suffix so cleanup-pg's two-config
      # sweep still works.
      #
      # `QS_E2E_PAGE_TIMEOUT=60000`: browser tier flake-mitigation —
      # 2-vCPU runners need slack on cold-start visual loads.
      - name: Run runner up_to=browser (deploy + browser e2e against Aurora)
        env:
          QS_GEN_CONFIG: /tmp/ci-pg-browser.yaml
          QS_GEN_TEST_L2_INSTANCE: tests/l2/spec_example.yaml
          QS_E2E_USER_ARN: ${{ secrets.QS_E2E_USER_ARN }}
          QS_E2E_PAGE_TIMEOUT: "60000"
        run: ./run_tests.sh up_to=browser --variants=sp_pg_aw

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pg-browser-screenshots-${{ github.run_id }}
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload runner artifacts (per-cell logs + db-perf + manifest)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pg-browser-runner-${{ github.run_id }}
          path: runs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-pg-browser.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-pg-browser.yaml --execute || true

  # W.5b — Oracle API leg. Mirror of ``e2e-pg-api`` against the
  # operator's external Oracle (RDS Oracle SE2 in us-east-1), pointed at
  # by the ``QS_GEN_ORACLE_URL`` secret set in W.0.b. Same 6 API test
  # files, ``-n auto``.
  #
  # Concurrency: distinct ``e2e-oracle`` group so it doesn't serialize
  # against PG runs — they're separate DBs and don't share schema, so
  # there's no contention to coordinate. Within Oracle runs the same
  # cancel-in-progress: false discipline applies (one Oracle deploy at
  # a time on the shared external DB).
  #
  # Driver: ``--extra demo-oracle`` instead of ``--extra demo`` —
  # pulls ``oracledb`` (thin client, no Instant Client install) instead
  # of ``psycopg2``. Same other extras as the PG job.
  #
  # Resource prefix: ``-oracle`` suffix so the QS resources are
  # distinct from the PG run's (no aliasing risk on the QS side, since
  # both target the same AWS account).
  e2e-oracle-api:
    needs: auth-smoke
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-oracle
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``demo-oracle`` brings in ``oracledb>=2.0`` (thin mode, no
        # Instant Client install needed). Skip ``--extra demo`` —
        # ``psycopg2`` would just sit unused on this leg.
        # ``serve`` brings starlette + aiosqlite for the runner's
        # unit layer (test_html_*.py imports App2 server runtime).
        run: uv sync --frozen --extra deploy --extra demo-oracle --extra audit --extra e2e --extra serve

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate per-run config.yaml
        run: |
          cat > /tmp/ci-oracle.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-oracle"
          dialect: "oracle"
          demo_database_url: "${{ secrets.QS_GEN_ORACLE_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      # Y.2.gate.k.1.thin-wrapper. Runner drives unit → db → app2 →
      # deploy → api against the operator's external Oracle.
      # `--variants=sp_or_aw` pins to a single named scenario × oracle
      # dialect × aw target so we deploy ONE dashboard set per run.
      - name: Run runner up_to=api (deploy + API e2e against external Oracle)
        env:
          QS_GEN_CONFIG: /tmp/ci-oracle.yaml
          QS_GEN_TEST_L2_INSTANCE: tests/l2/spec_example.yaml
          QS_E2E_USER_ARN: ${{ secrets.QS_E2E_USER_ARN }}
        run: ./run_tests.sh up_to=api --variants=sp_or_aw

      - name: Upload runner artifacts (per-cell logs + db-perf + manifest)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-oracle-api-runner-${{ github.run_id }}
          path: runs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-oracle.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-oracle.yaml --execute || true

  # W.7 — workflow-level always-cleanup. Belt-and-suspenders over the
  # per-job ``Cleanup (always)`` step on ``e2e-pg-api``. The per-job
  # step catches step / test failures (the common path); this job
  # catches the runner-died cases the per-job step can't:
  #
  #   - GHA 6h hard timeout kills the runner mid-step.
  #   - Runner OOM / crash. The runner is gone; no ``if: always()``
  #     handler runs because there's nothing left to run it on.
  #   - Manual workflow cancel that interrupts the runner before its
  #     step transitions complete.
  #
  # Job-level ``if: always()`` (with ``needs: [e2e-pg-api]``) means
  # this job ALWAYS runs after the e2e job, regardless of whether the
  # e2e job succeeded, failed, or was cancelled — but only after, so it
  # never races a still-deploying job.
  #
  # Concurrency MUST share the ``e2e-pg`` group with ``e2e-pg-api``
  # so cleanup never interleaves with another run's deploy. Schema
  # objects on the user's Aurora are scoped by the L2 instance prefix
  # (default: ``spec_example``) which is shared across runs — the
  # concurrency lock is the only thing keeping run A's cleanup from
  # dropping tables run B is mid-INSERT into.
  #
  # Idempotent with the per-job cleanup: ``json clean`` and
  # ``schema clean`` both no-op when the targets don't exist, so the
  # second sweep just confirms the first was complete.
  cleanup-pg:
    needs: [e2e-pg-api, e2e-pg-browser]
    # ``if: always()`` runs even when ``e2e-pg-browser`` is skipped
    # (push:main triggers don't fire it). Skipped jobs satisfy
    # ``needs:`` as success per GHA semantics, so this job runs in
    # all trigger modes.
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``deploy`` for boto3 (json clean), ``demo`` for psycopg2
        # (schema clean drops PG tables). Skip ``audit`` / ``e2e`` —
        # cleanup doesn't need the seed pipeline or pytest.
        run: uv sync --frozen --extra deploy --extra demo

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Regenerate per-run config.yamls
        # Same shape as the e2e jobs' configs — each carries the
        # matching ``resource_prefix`` so ``json clean`` filters to
        # this run's QS resources (post-v8.4.0 ResourcePrefix-tag
        # isolation). One config per source job (api + browser) —
        # ``json clean`` only sweeps resources tagged with the exact
        # ResourcePrefix the config carries.
        run: |
          cat > /tmp/ci-pg.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-pg"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF
          cat > /tmp/ci-pg-browser.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-pg-browser"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      - name: Sweep QS resources + drop schema objects
        # ``|| true`` so a clean failure doesn't mask the real e2e
        # failure (which already surfaced in the prior job's status).
        # Schema clean uses the ``-pg`` config since both deploys
        # write into the same Aurora schema (l2_instance_prefix is
        # shared across runs); only the QS-side tagging differs.
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-pg.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen json clean -c /tmp/ci-pg-browser.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-pg.yaml --execute || true

  # W.5b — Oracle parity for the W.7 belt-and-suspenders cleanup.
  # Same pattern as ``cleanup-pg`` but pointed at the Oracle leg's
  # config + concurrency group. Catches the same runner-died cases
  # (GHA hard timeout / OOM / cancel) the per-job ``Cleanup (always)``
  # on ``e2e-oracle-api`` can't.
  #
  # No browser sibling on the Oracle side yet — when one lands,
  # mirror ``cleanup-pg``'s multi-config sweep.
  cleanup-oracle:
    needs: [e2e-oracle-api]
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-oracle
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``deploy`` for boto3 (json clean), ``demo-oracle`` for
        # ``oracledb`` (schema clean drops Oracle tables). Skip
        # ``audit`` / ``e2e`` — cleanup doesn't need the seed pipeline
        # or pytest.
        run: uv sync --frozen --extra deploy --extra demo-oracle

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Regenerate per-run config.yaml
        run: |
          cat > /tmp/ci-oracle.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-oracle"
          dialect: "oracle"
          demo_database_url: "${{ secrets.QS_GEN_ORACLE_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      - name: Sweep QS resources + drop schema objects
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-oracle.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-oracle.yaml --execute || true
