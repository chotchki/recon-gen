name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (V.2 — uv sync from uv.lock)
        # `[audit]` brings in reportlab + pypdf + pyhanko; the audit
        # CLI verb (and tests/audit/) require them — pyhanko in
        # particular is needed even for unsigned PDFs because the
        # empty reviewer signature widgets land via pyhanko on every
        # render, regardless of whether `signing:` is configured.
        # `--frozen` fails the build if the lock is out of date.
        run: uv sync --frozen --extra dev --extra audit

      - name: Install Playwright WebKit browser
        # X.2.a.2 added a Playwright JS unit harness under tests/js/
        # that launches WebKit. Playwright ships its CLI but not the
        # browser binaries; CI must `playwright install` the browser
        # explicitly. Otherwise pytest fails with
        # "Executable doesn't exist at /home/runner/.cache/ms-playwright/webkit-…/pw_run.sh"
        # — same install used by the e2e workflow's browser job.
        run: .venv/bin/playwright install --with-deps webkit

      - name: Run tests with coverage (pytest sessionstart runs pyright strict)
        # W.8b — drop ``--cov-report=xml --cov-report=term`` from this
        # job: the coverage aggregator job below downloads the data
        # file and produces the combined report. ``COVERAGE_FILE`` is
        # named with a ``.py3.13`` suffix so the aggregator's
        # ``.coverage.*`` glob (kept for forward compatibility if a
        # second Python version is reintroduced) still matches.
        env:
          COVERAGE_FILE: .coverage.py3.13
        run: .venv/bin/pytest --cov=quicksight_gen

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-py3.13
          path: .coverage.py3.13
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  # P.7 — containerized integration job (Postgres leg).
  #
  # Y.2.gate.k.3 (2026-05-09): split off from the merged PG+Oracle
  # ``integration`` job. PR-quick mode — PG-only runs on every PR for
  # ~2-min feedback. The Oracle leg (``integration-oracle`` below) only
  # fires on push:main + workflow_dispatch — it costs ~3 min more
  # (Oracle Free service container ~60-90s first-boot init + per-step
  # apply/seed time), and dialect-divergence regressions are rare
  # enough that catching them at merge time is acceptable.
  #
  # Runs ``quicksight-gen schema/data/json apply`` against a live
  # Postgres service container, then verifies per-prefix matview row
  # counts via ``tests/e2e/test_demo_apply_row_counts.py`` (Y.2.gate.f.2
  # — was ``tests/integration/verify_demo_apply.py`` CLI before the
  # sweep).
  #
  # Service-container syntax (vs. ``docker run`` inside steps) lets GHA
  # health-check the DB before steps start, so the apply doesn't race
  # against the postgres init.
  integration-pg:
    needs: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: ci_pg_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (V.2 — uv sync from uv.lock)
        # `--extra audit` adds pyhanko on top of reportlab + pypdf
        # (already in [dev]) so `audit apply --execute` can land its
        # empty reviewer-signature widgets without ImportError.
        # `--extra e2e` adds pytest-xdist which the runner's unit layer
        # invokes via ``-n auto`` (k.1.proof — without it the runner
        # fails with ``pytest: error: unrecognized arguments: -n``).
        run: uv sync --frozen --extra dev --extra demo --extra audit --extra e2e

      - name: Generate per-job config.yaml
        # Cfg lives in /tmp so the runner picks it up via QS_GEN_CONFIG.
        # Container URL points at the GHA service container's exposed port.
        run: |
          cat > /tmp/ci-pg.yaml <<'EOF'
          aws_account_id: "000000000000"
          aws_region: "us-east-1"
          datasource_arn: "arn:aws:quicksight:us-east-1:000000000000:datasource/ci"
          resource_prefix: "qs-ci-pg"
          dialect: "postgres"
          demo_database_url: "postgresql://postgres:ci_pg_password@localhost:5432/postgres"
          EOF

      # Y.2.gate.k.1+k.6 — Phase 1 wedge (k.1.proof). Replaces the prior
      # manual `schema apply` + `data apply` + `data refresh` + `json apply`
      # + `pytest test_dataset_sql_smoke.py` chain with a single runner
      # invocation. QS_GEN_RUNNER_CI=1 tells setup_variant to skip
      # Docker spin-up (the postgres service container above is the DB);
      # QS_GEN_DEMO_DATABASE_URL points at it.
      #
      # The runner does:
      #   1. setup_variant — no-op (CI mode + URL pre-set)
      #   2. seed_variant — schema apply + data apply + data refresh
      #   3. dispatch_layer("db") — pytest tests/e2e/test_dataset_sql_smoke.py
      #
      # Per-cell artifacts land at runs/<run-id>/sp_pg_lo/db/{cmd,stdout,stderr}.log
      # for triage parity with local invocations.
      - name: Run runner db layer (CI-mode, no Docker spin-up)
        # Multi-variant fan-out (sp + sq for pg/lo) works fine here:
        # each variant gets its own synthesized L2 yaml with
        # `instance: <spec.name>` (e.g. `sp_pg_lo`, `sq_pg_lo`), so
        # their schemas live under disjoint prefixes and don't collide
        # on the shared GHA postgres service container.
        #
        # The runner's db layer dispatches:
        #   - test_dataset_sql_smoke.py — substitutes QS placeholders +
        #     runs every dataset's CustomSQL against the live DB.
        #   - test_demo_apply_row_counts.py (k.1.absorb, Phase 2) —
        #     asserts ≥1 row in every named matview. Reads
        #     QS_GEN_TEST_L2_INSTANCE from the runner's per-variant env
        #     (the synthesized yaml), so prefix discovery picks up the
        #     `<spec.name>_*` tables the runner just seeded.
        env:
          QS_GEN_RUNNER_CI: "1"
          QS_GEN_DEMO_DATABASE_URL: "postgresql://postgres:ci_pg_password@localhost:5432/postgres"
          QS_GEN_CONFIG: /tmp/ci-pg.yaml
          QS_GEN_TEST_L2_INSTANCE: tests/l2/spec_example.yaml
        run: ./run_tests.sh up_to=db --dialects=pg --targets=lo

      # Note: audit PDF render+verify dropped from this job — it was
      # querying `spec_example_*` directly via cfg's L2 default, but
      # the runner now creates tables under per-variant prefixes
      # (`sp_pg_lo_*`, `sq_pg_lo_*`). k.1.absorb-audit (Phase 2.5)
      # queues moving audit-PDF render+verify into the runner's `db`
      # layer (probably wrap as a pytest first; audit isn't pytest yet).
      # Local audit coverage: `tests/audit/`, `tests/e2e/test_audit_*`.

  # P.7 — containerized integration job (Oracle leg).
  #
  # Y.2.gate.k.3 (2026-05-09): gated to push:main + workflow_dispatch
  # only. Oracle Free service container costs ~60-90s first-boot init,
  # plus per-step apply time — too slow to gate every PR on. Catches
  # dialect-divergence regressions at merge time (PG-only PRs already
  # passed integration-pg).
  #
  # ``gvenzl/oracle-free`` is the de-facto Oracle Free Edition image
  # for CI (Oracle's own ``container-registry.oracle.com`` requires
  # login). ``:latest`` is the full Oracle Free 23ai (~2GB image,
  # ~60-90s first-boot init). ``FREEPDB1`` is the default service
  # name; admin user is ``system`` with the password we set here.
  integration-oracle:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-free:latest
        env:
          ORACLE_PASSWORD: ci_ora_password
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 30s
          --health-timeout 30s
          --health-retries 30
          --health-start-period 90s

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (V.2 — uv sync from uv.lock)
        run: uv sync --frozen --extra dev --extra demo-oracle --extra audit

      - name: Apply demo against Oracle Free
        run: |
          cat > /tmp/ci-oracle.yaml <<'EOF'
          aws_account_id: "000000000000"
          aws_region: "us-east-1"
          datasource_arn: "arn:aws:quicksight:us-east-1:000000000000:datasource/ci"
          resource_prefix: "qs-ci-oracle"
          dialect: "oracle"
          demo_database_url: "system/ci_ora_password@localhost:1521/FREEPDB1"
          EOF
          # Q.3.a (v8.0.0): chain the four artifact groups explicitly
          # in place of the legacy bundled `demo apply --all`.
          .venv/bin/quicksight-gen schema apply -c /tmp/ci-oracle.yaml --execute
          .venv/bin/quicksight-gen data apply -c /tmp/ci-oracle.yaml --execute
          .venv/bin/quicksight-gen data refresh -c /tmp/ci-oracle.yaml --execute
          .venv/bin/quicksight-gen json apply -c /tmp/ci-oracle.yaml -o /tmp/ci-oracle-out

      # Note: row-count smoke for Oracle is NOT yet absorbed into a
       # runner invocation (Oracle leg still uses the legacy direct CLI
       # path; Phase 1 wedge migration queued for a follow-up commit so
       # we can verify the PG path stabilizes first).
      - name: Verify Oracle row counts
        # Same rationale as the Postgres row-count verify above.
        env:
          QS_GEN_E2E: "1"
          QS_GEN_CONFIG: /tmp/ci-oracle.yaml
          QS_GEN_TEST_L2_INSTANCE: tests/l2/spec_example.yaml
        run: |
          .venv/bin/pytest tests/e2e/test_demo_apply_row_counts.py -v

      - name: Smoke every dataset's CustomSQL against Oracle
        # Same rationale as the Postgres dataset smoke above. The
        # Oracle leg matters more — most dialect divergences (JSON
        # path concat, ORA-00923 SELECT-without-FROM, ORA-00911
        # underscore identifier, ORA-25154 USING qualifier) only
        # break here, not against PG.
        env:
          QS_GEN_E2E: "1"
          QS_GEN_CONFIG: /tmp/ci-oracle.yaml
          QS_GEN_TEST_L2_INSTANCE: tests/l2/spec_example.yaml
        run: |
          .venv/bin/pytest tests/e2e/test_dataset_sql_smoke.py -v

      - name: Render + verify the audit PDF against Oracle
        # Same rationale as the Postgres audit PDF step above. Catches
        # Oracle-only PDF render breakage (e.g. SQL/JSON path syntax
        # divergence in the matview queries that audit reads).
        run: |
          .venv/bin/quicksight-gen audit apply \
            -c /tmp/ci-oracle.yaml --execute -o /tmp/ci-oracle-report.pdf
          .venv/bin/quicksight-gen audit verify \
            /tmp/ci-oracle-report.pdf -c /tmp/ci-oracle.yaml

  # W.8b — combine the matrix entries' coverage data, render a
  # markdown summary into the GitHub Actions Step Summary (so the
  # number is one click from the run page, not buried in logs), and
  # publish the combined XML + HTML as artifacts. Pattern follows
  # Hynek Schlawack's "Ditch Codecov" article — server-side coverage
  # service replaced by a workflow job and a downloadable HTML
  # report.
  #
  # Threshold: not gated. The user noted ~80% is the comfortable
  # band — gating on a number tends to invite useless test churn,
  # so the workflow surfaces the percentage and leaves the call to
  # the operator. Add ``--fail-under=N`` to the report step below if
  # you want the gate later.
  coverage:
    name: Combine + report coverage
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (just coverage tooling)
        # ``coverage`` is a transitive dep of pytest-cov which is in
        # ``[dev]``. ``--no-install-project`` would skip the heavy
        # extras, but uv sync needs the project for the venv shape;
        # ``[dev]`` alone is light enough.
        run: uv sync --frozen --extra dev

      - name: Download all coverage data artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data files
        # Each matrix entry uploaded ``.coverage.<host>.<pid>.<rand>``
        # files (``parallel = true`` in pyproject). ``coverage
        # combine`` merges them into a single ``.coverage`` data
        # file the report / xml / html steps consume.
        run: .venv/bin/coverage combine

      - name: Render markdown report (Step Summary + artifact)
        # ``--format=markdown`` emits a GitHub-Flavored-Markdown
        # table (coverage.py 7.x feature). Same content goes to
        # both:
        #   1. ``$GITHUB_STEP_SUMMARY`` — surfaces above the per-job
        #      logs on the run page.
        #   2. ``coverage-report.md`` — uploaded as an artifact and
        #      republished by the ``coverage-badge`` job to the
        #      ``badges`` branch so the README's coverage badge can
        #      wrap-link to a human-readable report (``raw.git`` URL
        #      stays static across runs since the file lives on the
        #      ``badges`` branch).
        run: |
          {
            echo "# Coverage report"
            echo ""
            echo "_Generated by W.8b coverage workflow on commit ${GITHUB_SHA:0:7}._"
            echo ""
            .venv/bin/coverage report --format=markdown
          } > coverage-report.md
          cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Render terminal report (for the job log)
        run: .venv/bin/coverage report

      - name: Generate HTML report
        run: .venv/bin/coverage html -d htmlcov

      - name: Generate XML report
        run: .venv/bin/coverage xml -o coverage.xml

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-${{ github.run_id }}
          path: htmlcov/
          retention-days: 14

      - name: Upload combined XML report
        # Consumed by the ``coverage-badge`` job below — keeps the
        # badge in sync with the unified report instead of re-running
        # the suite a third time just for the badge.
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ github.run_id }}
          path: coverage.xml
          retention-days: 14

      - name: Upload markdown report
        # Consumed by ``coverage-badge`` so it can republish to the
        # ``badges`` branch; the README's coverage badge then
        # wrap-links to it.
        uses: actions/upload-artifact@v7
        with:
          name: coverage-md-${{ github.run_id }}
          path: coverage-report.md
          retention-days: 14

  # Build a wheel from the current commit, install it in a fresh venv
  # (NOT an editable / src-tree install), and run ``docs apply
  # --portable`` end-to-end. Catches the class of regression where
  # docs sourcing assumes a repo checkout — pre-restructure the
  # bundled mkdocs.yml + main.py + L2 fixtures lived outside ``src/``
  # and were only present in a dev tree, so installed users hit a
  # ``mkdocs.yml not found`` failure when running ``docs apply``.
  docs-portable-install:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build wheel
        run: |
          uv pip install --system build
          python -m build --wheel --outdir /tmp/wheelhouse

      - name: Install wheel into a fresh venv (NOT editable)
        # ``uv venv`` plus ``uv pip install`` against the built wheel
        # mirrors what an end-user does after ``pip install
        # quicksight-gen[docs]`` — no symlinks back to the repo
        # ``src/`` tree, so any path code that walks parents to find
        # repo-root files breaks here.
        run: |
          uv venv /tmp/portable-test-venv
          uv pip install --python /tmp/portable-test-venv/bin/python \
              "$(ls /tmp/wheelhouse/quicksight_gen-*.whl)[docs]"

      - name: Build portable docs from installed wheel
        run: |
          /tmp/portable-test-venv/bin/quicksight-gen docs apply \
              --portable -o /tmp/portable-site
          test -f /tmp/portable-site/index.html
          test -f /tmp/portable-site/handbook/l1.html

  coverage-badge:
    needs: coverage
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install genbadge in an isolated venv
        # W.8b's ``uv pip install --system`` fails on the runner
        # because the system Python is PEP 668 externally-managed
        # (``error: The interpreter at /usr is externally managed``).
        # Spin up a lightweight venv just for genbadge — same pattern
        # the docs-portable-install job uses.
        run: |
          uv venv /tmp/badge-venv
          uv pip install --python /tmp/badge-venv/bin/python \
              'genbadge[coverage]'

      - name: Download combined coverage XML
        uses: actions/download-artifact@v6
        with:
          name: coverage-xml-${{ github.run_id }}

      - name: Download combined coverage markdown
        uses: actions/download-artifact@v6
        with:
          name: coverage-md-${{ github.run_id }}

      - name: Generate badge SVG
        run: /tmp/badge-venv/bin/genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Push badge + report to badges branch
        # Stash both files in /tmp before the orphan-branch reset
        # blows them away. README's coverage badge wrap-links to
        # ``coverage-report.md`` on this branch — raw.git URL stays
        # static across runs, so the link doesn't rot.
        run: |
          cp coverage-badge.svg /tmp/coverage-badge.svg
          cp coverage-report.md /tmp/coverage-report.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          git checkout --orphan badges-tmp
          git rm -rf .
          cp /tmp/coverage-badge.svg coverage-badge.svg
          cp /tmp/coverage-report.md coverage-report.md
          git add coverage-badge.svg coverage-report.md
          git commit -m "Update coverage badge + report"
          git push origin badges-tmp:badges --force
