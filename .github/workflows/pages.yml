name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install docs dependencies (V.2 — uv sync from uv.lock)
        run: uv sync --frozen --extra dev

      - name: Build site
        # Goes through ``recon-gen docs apply`` instead of bare
        # ``mkdocs build`` so this Pages build exercises the same
        # code path an installed-wheel operator would. Catches the
        # bundled-mkdocs.yml resolution that broke pre-restructure.
        run: .venv/bin/recon-gen docs apply -o site

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
