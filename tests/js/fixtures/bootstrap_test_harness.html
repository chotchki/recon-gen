<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bootstrap.js unit harness</title>
    <script>
      // X.2.a.2 — JS unit harness. Sets the test-mode flag BEFORE
      // bootstrap.js loads so its IIFE exports the internals on
      // window.__bootstrap_internals__. Mocks htmx.ajax with a
      // recording stub so tests can assert on call shape without
      // a real server. Listener for the custom 'sankey:click'
      // event is wired here too so fireAnchorRequest's dev-log
      // hook can be inspected from the test.
      window.__test_mode__ = true;
      window.__htmx_calls__ = [];
      window.htmx = {
        ajax: (verb, url, opts) => {
          window.__htmx_calls__.push({ verb: verb, url: url, opts: opts });
        },
      };
      window.__sankey_clicks__ = [];
      document.addEventListener("DOMContentLoaded", () => {
        document.body.addEventListener("sankey:click", (evt) => {
          window.__sankey_clicks__.push(evt.detail);
        });
      });
    </script>
  </head>
  <body>
    <!-- fireAnchorRequest reads form values via FormData(#filter-form) -->
    <form id="filter-form">
      <input type="hidden" name="date_from" value="2024-01-01" />
      <input type="hidden" name="date_to" value="2024-12-31" />
    </form>
    <!--
      Section the JS resolves data-fetch-url from. The X.2.b GET
      surface has render.py emit this attribute on every <section>;
      fireAnchorRequest looks it up by visualId so the JS doesn't
      construct URLs itself.
    -->
    <section
      data-visual-kind="Sankey"
      data-visual-id="viz-money-trail"
      data-fetch-url="/dashboards/test/sheets/money-trail/visuals/viz-money-trail/data"
    ></section>
    <!--
      Paths are relative to THIS file. file:// URLs resolve <script src>
      relative to the loaded document, not pytest's cwd, so this works
      regardless of where pytest is invoked from.

      d3 first (the renderXxx hydrators use d3.select / d3.scale*) — the
      *vendored* copy (X.2.p), not a CDN, so the JS unit harness runs
      offline like the shipped runtime does. Plain <script src> blocks +
      runs in order, so by the time bootstrap.js's IIFE finishes,
      window.d3 is already defined.
    -->
    <script src="../../../src/quicksight_gen/common/html/assets/vendor/js/d3.min.js"></script>
    <script src="../../../src/quicksight_gen/common/html/assets/js/bootstrap.js"></script>
  </body>
</html>
