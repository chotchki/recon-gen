# Kitchen-sink L2 instance — exercises every primitive shape + every
# variant flag at least once. Per M.1.8: this is the regression harness
# for "did anything stop loading + validating + emitting cleanly?"
#
# Shape: a slightly-extended merchant-acquirer pipeline. Adds primitives
# the SPEC's worked example didn't cover (single-leg aggregating rail,
# Cadence variants beyond intraday-2h, completion forms beyond metadata.,
# multiple TransferTemplates, both XOR + non-XOR chains).
#
# Loaded by `tests/test_l2_pipeline.py::test_kitchen_sink_*` — if a new
# primitive lands without coverage here, the test count check fires.

instance: kitchen
description: |
  Kitchen-sink L2 instance — exercises every L2 primitive and every
  variant flag. Used as the regression harness for "did anything stop
  loading + validating + emitting cleanly?". Top-level description
  exercises the M.1a.6 instance-level prose surface.

# ---------------------------------------------------------------------
# Singleton accounts: one per role used by the rails below. Mix of
# internal + external; one with explicit expected_eod_balance, one with
# explicit name + parent_role chain (singleton-under-singleton).
# ---------------------------------------------------------------------
accounts:
  - id: north-pool
    name: North Pool
    role: NorthPool
    scope: internal
    description: Pool A in the two-pool sweep loop. Holds merchant ledger balances.

  - id: south-pool
    name: South Pool
    role: SouthPool
    scope: internal

  - id: gl-control
    role: ControlAccount
    scope: internal

  - id: clearing-suspense
    name: Clearing Suspense
    role: ClearingSuspense
    scope: internal
    expected_eod_balance: 0

  - id: ext-counter
    role: ExternalCounterparty
    scope: external

# ---------------------------------------------------------------------
# AccountTemplates: parent_role on each MUST resolve to a singleton
# Account (R3). No template-under-template nesting.
# ---------------------------------------------------------------------
account_templates:
  - role: CustomerSubledger
    scope: internal
    parent_role: SouthPool
    description: |
      Per-customer subledger; one runtime instance per customer_id.
      Carried as Metadata at posting time, materialized via ETL.

  - role: MerchantLedger
    scope: internal
    parent_role: NorthPool

  - role: WatchlistAccount
    scope: internal
    parent_role: ControlAccount
    expected_eod_balance: 0

# ---------------------------------------------------------------------
# Rails — every shape variant present:
#   - Two-leg standalone (with expected_net)
#   - Two-leg as TransferTemplate leg (NO expected_net per S2)
#   - Single-leg in TransferTemplate leg_rails (S3 reconciliation path A)
#   - Single-leg Variable-direction (closing leg)
#   - Single-leg reconciled by an aggregating rail (S3 path B)
#   - Two-leg aggregating with intraday-2h cadence
#   - Single-leg aggregating with daily-eod cadence
#   - Union role (RoleA | RoleB)
# ---------------------------------------------------------------------
rails:
  # Standalone two-leg with PER-LEG ORIGIN OVERRIDES (M.1a.2).
  # Inbound from external party: external leg is force-posted, internal
  # leg is initiated by us recording the credit. No rail-level `origin`
  # because the per-leg overrides cover both legs (validator's O1 rule).
  # PostedRequirements + max_pending_age also exercise the new fields.
  - name: ExternalRailInbound
    source_role: ExternalCounterparty
    destination_role: ClearingSuspense
    expected_net: 0
    source_origin: ExternalForcePosted
    destination_origin: InternalInitiated
    metadata_keys: [external_reference]
    posted_requirements: [external_reference]
    max_pending_age: PT24H
    description: |
      Inbound ACH from a counterparty bank. The external party drives
      the rail (their force-post) while we record the corresponding
      credit on the internal clearing suspense — hence the per-leg
      Origin override. ETL must capture the bank's trace number
      (`external_reference`) before the row can be Posted.

  # Two-leg in MerchantSettlementCycle.leg_rails — no expected_net (S2)
  - name: SettlementSweepLeg
    source_role: SouthPool
    destination_role: NorthPool
    origin: InternalInitiated
    metadata_keys: [merchant_id, settlement_period]

  # Single-leg, in MerchantSettlementCycle.leg_rails (S3 path A).
  # max_unbundled_age exercises the bundler-liveness aging watch — this
  # rail's transfer_type is matched by PoolBalancingNorthToSouth's
  # bundles_activity, so the watch is meaningful (R8 OK).
  - name: SubledgerCharge
    leg_role: CustomerSubledger
    leg_direction: Debit
    origin: InternalInitiated
    metadata_keys: [merchant_id, customer_id, settlement_period, settlement_period_end]
    max_unbundled_age: PT4H

  - name: SubledgerRefund
    leg_role: CustomerSubledger
    leg_direction: Credit
    origin: InternalInitiated
    metadata_keys: [merchant_id, customer_id, settlement_period, settlement_period_end]

  # Single-leg Variable closing leg of the template
  - name: SettlementClose
    leg_role: MerchantLedger
    leg_direction: Variable
    origin: InternalInitiated
    metadata_keys: [merchant_id, settlement_period, settlement_period_end]

  # Single-leg reconciled by aggregating rail below (S3 path B). Direction
  # is `Debit` rather than `Variable` because Variable closure semantics
  # require a containing TransferTemplate's ExpectedNet (validator C3) —
  # this rail's role is to exercise S3 path B (aggregating reconciliation),
  # which works the same for any non-Variable direction.
  - name: WatchlistAdjustment
    leg_role: WatchlistAccount
    leg_direction: Debit
    origin: InternalInitiated
    metadata_keys: [adjustment_reason]

  # Standalone payout — XOR group target
  - name: MerchantPayoutACH
    source_role: MerchantLedger
    destination_role: ExternalCounterparty
    expected_net: 0
    origin: InternalInitiated
    metadata_keys: [merchant_id, settlement_period]

  - name: MerchantPayoutVoucher
    source_role: MerchantLedger
    destination_role: ExternalCounterparty
    expected_net: 0
    origin: InternalInitiated
    metadata_keys: [merchant_id, settlement_period]

  # Two-leg aggregating, intraday-2h
  - name: PoolBalancingNorthToSouth
    source_role: NorthPool
    destination_role: SouthPool
    expected_net: 0
    origin: InternalInitiated
    metadata_keys: [bundled_transfer_type, business_day]
    aggregating: true
    bundles_activity: [SubledgerCharge, SubledgerRefund]
    cadence: intraday-2h

  # Single-leg aggregating, daily-eod cadence — sweeps WatchlistAdjustment activity
  - name: WatchlistDailySweep
    leg_role: ExternalCounterparty
    leg_direction: Credit
    origin: InternalInitiated
    metadata_keys: [bundled_transfer_type, business_day]
    aggregating: true
    bundles_activity: [WatchlistAdjustment]
    cadence: daily-eod

  # Two-leg standalone with union source_role
  - name: BatchInbound
    source_role: [ExternalCounterparty, ClearingSuspense]
    destination_role: SouthPool
    expected_net: 0
    origin: ExternalForcePosted
    metadata_keys: [batch_id]

  # Single-leg in DailyClearingCycle.leg_rails — provides the leg
  # the template needs (and exercises a different Completion form).
  - name: ClearingPosting
    leg_role: ClearingSuspense
    leg_direction: Variable
    origin: InternalInitiated
    metadata_keys: [batch_id]

# ---------------------------------------------------------------------
# TransferTemplates with each Completion vocabulary form covered across
# the three templates (business_day_end, business_day_end+Nd, month_end,
# metadata.<key>).
# ---------------------------------------------------------------------
transfer_templates:
  - name: MerchantSettlementCycle
    expected_net: 0
    transfer_key: [merchant_id, settlement_period]
    completion: metadata.settlement_period_end
    leg_rails: [SubledgerCharge, SubledgerRefund, SettlementSweepLeg, SettlementClose]
    description: |
      One shared Transfer per (merchant, settlement_period). Charges
      and refunds accumulate as legs; SettlementClose's Variable leg
      brings the bundle to zero at period end.

  - name: DailyClearingCycle
    expected_net: 0
    transfer_key: [batch_id]
    completion: business_day_end
    leg_rails: [ClearingPosting]

# ---------------------------------------------------------------------
# Chains — both XOR and non-XOR; required + optional.
# ---------------------------------------------------------------------
chains:
  # Z.A: multi-children list = XOR alternation (exactly one fires).
  - parent: MerchantSettlementCycle
    children:
      - MerchantPayoutACH
      - MerchantPayoutVoucher
    description: |
      Payout-vehicle XOR — exactly one of these fires per settled
      MerchantSettlementCycle. ACH for SNB-banking merchants;
      voucher (paper) for everyone else.

  # Z.A: singleton-children list = "required" semantics (always fires).
  - parent: DailyClearingCycle
    children:
      - ExternalRailInbound
    description: |
      Every clearing cycle MUST have at least one ExternalRailInbound
      child — the in-cycle reconciliation pulls inbound activity that
      offsets the outbound sweep.

# ---------------------------------------------------------------------
# Limit Schedules across the three pool/template parent roles.
# ---------------------------------------------------------------------
limit_schedules:
  - parent_role: SouthPool
    rail: SubledgerCharge
    cap: 5000.00
    description: |
      Per-customer daily charge cap. Each child sub-ledger is evaluated
      independently against this cap; not aggregated across siblings.

  - parent_role: NorthPool
    rail: MerchantPayoutACH
    cap: 25000.00

  - parent_role: ControlAccount
    rail: WatchlistAdjustment
    cap: 1000.00

# ---------------------------------------------------------------------
# Inline brand theme (N.1.i). Distinct from the registry default so
# the kitchen-sink loader test can detect that the inline path fires.
# Persona-neutral palette (purples + grey) — kitchen sink stays L1-clean.
# ---------------------------------------------------------------------
theme:
  theme_name: "Kitchen Sink Theme"
  version_description: "Persona-neutral palette exercising the inline theme block"
  analysis_name_prefix: null
  data_colors:
    - "#5E3B7A"
    - "#A86BD2"
    - "#3F7A8C"
    - "#7A8C3F"
    - "#C29A2A"
    - "#8A4F3F"
    - "#5C5C68"
    - "#9C9CA8"
  empty_fill_color: "#E0E0E6"
  gradient: ["#E5DAF0", "#3D2654"]
  primary_bg: "#FFFFFF"
  secondary_bg: "#F4F1F8"
  primary_fg: "#28232E"
  secondary_fg: "#5C5C68"
  accent: "#5E3B7A"
  accent_fg: "#FFFFFF"
  link_tint: "#EFE8F5"
  danger: "#A33038"
  danger_fg: "#FFFFFF"
  warning: "#C2820A"
  warning_fg: "#FFFFFF"
  success: "#3A7B53"
  success_fg: "#FFFFFF"
  dimension: "#A86BD2"
  dimension_fg: "#FFFFFF"
  measure: "#3D2654"
  measure_fg: "#FFFFFF"
