plugins:
  - search
  - macros:
      # Phase O.1.c — `{{ diagram(...) }}` macro lives in
      # `main.py` next to this config. mkdocs-macros's project_dir is
      # the directory containing this file, so it finds
      # ``<dir>/main.py`` via local file lookup. The same path resolves
      # in dev (``<repo>/src/recon_gen/main.py``) and from an
      # installed wheel (``<site-packages>/recon_gen/main.py``).
      # mkdocs-macros doesn't reliably support dotted Python imports
      # for module_name — it treats the value as a relative file
      # lookup against project_dir.
      module_name: main
      # mkdocs-macros resolves include_dir relative to project_dir
      # (the dir containing mkdocs.yml) — NOT docs_dir. So this is
      # ``docs/_macros`` not bare ``_macros``. Same in dev
      # (``<repo>/src/recon_gen/docs/_macros/``) and installed
      # (``<site-packages>/recon_gen/docs/_macros/``).
      include_dir: docs/_macros
  - mkdocstrings:
      handlers:
        python:
          # No ``paths:`` — recon_gen is installed (uv sync /
          # pip install) so mkdocstrings imports it through the
          # active Python interpreter. Removes the dev-vs-installed
          # path difference that ``paths: [src]`` would create.
          options:
            show_root_heading: true
            show_root_full_path: false
            show_if_no_docstring: true
            show_source: false
            members_order: source
            docstring_style: google
            heading_level: 2
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true

markdown_extensions:
  - toc:
      permalink: true
  - md_in_html
  # AH.5 — stable ``{#slug}`` heading anchors. L1_Invariants / Schema_v6
  # headings carry ``{{ l2_instance_name }}`` + a number prefix, so their
  # auto-slugs are L2-instance-dependent (unstable). Cross-references use
  # short natural slugs (#fan-in-disagreement) pinned via attr_list.
  - attr_list
  - pymdownx.superfences
  # Q.2.c.exec.3 — admonitions enable the ??? collapse pattern used to
  # fold screenshot embeds by default. `pymdownx.details` is what makes
  # the `???` (vs `!!!`) syntax fold-by-default; `admonition` provides
  # the styling.
  - admonition
  - pymdownx.details
  # Auto-generated CLI reference (docs/reference/cli.md). Reads the
  # Click command tree at build time.
  - mkdocs-click
