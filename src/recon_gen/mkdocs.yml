site_name: Recon Generator
site_description: Training materials and documentation for the QuickSight financial reporting dashboards
site_url: https://chotchki.github.io/recon-gen/
# repo_url / repo_name intentionally omitted — the docs site is the
# self-contained reference and should carry no clickable github links.
# (site_url stays for sitemap canonical URLs; not rendered as a link.)
# Bundled inside the package — same path in dev
# (``<repo>/src/recon_gen/mkdocs.yml``) and installed mode
# (``<site-packages>/recon_gen/mkdocs.yml``). docs_dir points
# at the sibling ``docs/`` directory which holds the actual markdown
# content. mkdocs rejects ``docs_dir: .`` because it doesn't allow
# the docs dir to be the config file's own directory, so the config
# lives one level up from ``docs/`` and the relative paths inside
# (extra_css, extra_javascript, plugins.macros.include_dir) all stay
# relative to docs_dir.
docs_dir: docs

theme:
  name: material
  # No default logo / favicon — when an L2 instance YAML carries a
  # `theme.logo` / `theme.favicon` value, main.py's mkdocs-macros
  # entry overrides these keys at build time. Without an L2 override
  # the site renders text-only navigation (mkdocs-material default)
  # rather than falling back to a persona-specific mark.
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy

extra_css:
  - stylesheets/site.css

extra_javascript:
  # Click-to-zoom lightbox for inline-SVG diagrams emitted by
  # main.py::_wrap_svg. Pure vanilla JS, no third-party dep.
  - stylesheets/qs-lightbox.js
  # Phase S spike — graphviz WASM bootstrap. Finds every
  # <script type="text/x-graphviz"> block (emitted when QS_USE_WASM=1
  # at build time), loads @hpcc-js/wasm-graphviz from jsDelivr +esm,
  # renders. Inert when no such blocks are on the page.
  - stylesheets/qs-graphviz-wasm.js

