{
  "_comment": [
    "App 2's vendored third-party browser libs (X.2.p) — committed so a",
    "`pip install quicksight-gen[serve] && quicksight-gen serve app2 apply`",
    "works with zero internet. The page shell (common/html/render.py)",
    "loads these from /static/vendor/... off the existing assets/ static",
    "mount; package_data ships them inside the wheel.",
    "",
    "These are pre-built minified dist files (the exact bytes the CDNs",
    "served) — NOT source. No bundler/esbuild: opaque already-minified",
    "UMD, nothing to bundle or tree-shake. See",
    "docs/audits/x_2_p_offline_bundle_spike.md.",
    "",
    "To bump a version: edit the version + source_url here (and set",
    "sha256 to null), then run `python scripts/vendor_js_deps.py --update`",
    "— it re-downloads, writes the file, and fills in the sha256. CI's",
    "tests/unit/test_vendor_assets.py asserts every committed file's",
    "sha256 matches this lock (same model as tests/data/_locked_seeds/)."
  ],
