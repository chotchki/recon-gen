    - "#3A9E6F"
    - "#4A7DC7"
    - "#8E5EA2"
    - "#E6B422"
    - "#4BC0C0"
    - "#8C8C8C"
  empty_fill_color: "#D9D9D9"
  gradient: ["#C5DAF7", "#2E5090"]
  primary_bg: "#FFFFFF"
  secondary_bg: "#F5F6FA"
  primary_fg: "#2D2D2D"
  secondary_fg: "#4A4A4A"
  accent: "#2E5090"
  accent_fg: "#FFFFFF"
  link_tint: "#E8EFF9"
