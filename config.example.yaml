# QuickSight Generator Configuration
#
# config.yaml is environment-only — AWS account, region, dialect, DB
# connection, signing material. Institution shape (theme, persona,
# rails, chains, accounts, transfer_templates, account_templates,
# limit_schedules) lives in the L2 institution YAML you pass via
# `--l2 <path>`. The loader rejects L2-only keys here so a misedit
# fails loud instead of silently no-op'ing.
#
# Copy this file to config.yaml and fill in your values. All values
# can also be set via environment variables with a QS_GEN_ prefix.

aws_account_id: "123456789012"
aws_region: "us-east-1"

# ARN of the pre-existing QuickSight datasource to query against.
# Not required when demo_database_url is set (auto-derived from account/region/prefix).
datasource_arn: "arn:aws:quicksight:us-east-1:123456789012:datasource/your-datasource-id"

# Prefix for all generated resource IDs (optional, default: qs-gen)
resource_prefix: "qs-gen"

# Theme: declared on the L2 institution YAML's inline `theme:` block,
# NOT here. Each institution carries its own brand palette so swapping
# the L2 swaps the look. Omit `theme:` on the L2 to fall back to the
# generator's default preset (deploy may also fall through to AWS
# QuickSight CLASSIC).

# IAM principal ARNs to grant permissions on generated resources (optional).
# Accepts a single string or a list; one ResourcePermission is emitted per ARN.
# principal_arns:
#   - "arn:aws:quicksight:us-east-1:123456789012:user/default/admin"
#   - "arn:aws:iam::123456789012:user/analyst"

# SQL dialect for the deployed datasource (default: postgres). Must
# match the datasource type — a Postgres datasource_arn cannot serve
# Oracle-rendered SQL and vice versa. Operators typically carry two
# config files (config-postgres.yaml + config-oracle.yaml). For local
# integrator iteration use `sqlite` — runs against a single-file or
# in-memory database without a server (X.3); not deployable to
# QuickSight (`json apply --execute` and `build_datasource` reject it).
# dialect: "postgres"

# Database connection URL for the demo apply command (optional).
# Required for: `data apply --execute`, `audit apply --execute`.
# When set, datasource_arn auto-derives from account/region/prefix
# (Postgres + Oracle only — SQLite rejects datasource derivation).
# demo_database_url: "postgresql://user:pass@localhost:5432/quicksight_demo"
# demo_database_url: "oracle+oracledb://user:pass@host:1521/?service_name=ORCL"
# demo_database_url: "sqlite:///tmp/quicksight_demo.sqlite"  # X.3 local-loop

# U.7.b — Audit PDF auto-sign material (optional). PEM RSA key + cert.
# When present, `audit apply --execute` runs the rendered PDF through
# pyHanko to apply a CMS signature. Absent = ship the PDF unsigned.
# signing:
#   key_path: "ops/signing-key.pem"
#   cert_path: "ops/signing-cert.pem"
#   passphrase_env: "SIGNING_KEY_PASSPHRASE"  # optional, for encrypted keys
#   signer_name: "Audit Signing Authority"    # optional
