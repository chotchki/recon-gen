# Example QuickSight Generator configuration.
#
# config.yaml is environment-only — AWS account, region, dialect, DB
# connection, signing material. Institution shape (theme, persona,
# rails, chains, accounts, transfer_templates, account_templates,
# limit_schedules) lives in the L2 institution YAML you pass via
# `--l2 <path>`. The loader rejects L2-only keys here so a misedit
# fails loud instead of silently no-op'ing.
#
# All values here are placeholders — they are syntactically valid but
# do not resolve to any real AWS resource. Use this file as a template:
#
#   1. Copy to config.yaml at the root of your working directory.
#   2. Replace the account ID, region, datasource ARN, and principal
#      ARNs with values from your AWS account.
#   3. (Demo mode only) set demo_database_url to a Postgres 17+ /
#      Oracle 19c+ connection string and omit datasource_arn — the
#      generator will derive the ARN.
#
# This config is also what bakes the `out-sample.zip` bundle attached
# to each GitHub Release: a known-good `json apply` output that
# evaluators can inspect without installing or running the tool.

aws_account_id: "111122223333"
aws_region: "us-east-1"

# Pre-existing QuickSight datasource pointing at your warehouse.
# Required for `json apply --execute`; optional for plain `json apply`
# (placeholders work fine).
datasource_arn: "arn:aws:quicksight:us-east-1:111122223333:datasource/example-datasource"

# Z.C — Deployment identity (both required, no defaults, loud-fail at load).
# `deployment_name` prefixes every QS resource ID; `db_table_prefix`
# prefixes every emitted DB table / matview / dataset name.
deployment_name: "qsgen-prod"
db_table_prefix: "qsgen_prod"

# Theme: declared inline on the L2 institution YAML's `theme:` block,
# NOT here. Each L2 carries its own brand palette so swapping the L2
# swaps the look. The default preset is the in-canvas-accent fallback
# when an L2 declares no theme.

# IAM principals granted permissions on every generated resource.
principal_arns:
  - "arn:aws:quicksight:us-east-1:111122223333:user/default/example-user"

# Demo-mode connection URL (uncomment to drive `data apply --execute`
# / `audit apply --execute`). Postgres 17+ or Oracle 19c+.
# demo_database_url: "postgresql://user:password@host:5432/dbname"
